<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Patrol Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        #header {
            height: 40px;
            background: #252525;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #333;
            font-size: 15px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        #header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            margin-left: 12px;
        }

        #header .status-dot.connected { background: #4caf50; }
        #header .status-dot.disconnected { background: #f44336; }

        #main {
            display: flex;
            height: calc(100vh - 40px - 50px);
        }

        #left-panel {
            flex: 1;
            position: relative;
            border-right: 1px solid #333;
        }

        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        #orbit-canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Right panel sub-sections */
        #robot-camera-section {
            flex: 1;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        #robot-camera-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: #252525;
            border-bottom: 1px solid #333;
            font-size: 12px;
        }

        #robot-camera-header .toggle-group {
            display: flex;
            gap: 4px;
        }

        #robot-camera-header button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            padding: 3px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        #robot-camera-header button:hover { background: rgba(255,255,255,0.15); color: #ddd; }
        #robot-camera-header button.active { background: rgba(76,175,80,0.4); color: #fff; }

        #robot-camera-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            min-height: 0;
        }

        #robot-canvas-container {
            position: relative;
            width: 640px;
            height: 480px;
            max-width: 100%;
            max-height: 100%;
        }

        #robot-canvas-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #annotated-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            pointer-events: none;
        }

        #detection-panel {
            max-height: 180px;
            overflow-y: auto;
            background: #1e1e1e;
            border-top: 1px solid #333;
            padding: 8px 12px;
            font-size: 12px;
        }

        #detection-panel .det-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #888;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .detection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 8px;
            margin: 2px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            font-size: 12px;
        }

        .detection-item .det-label {
            color: #e0e0e0;
        }

        .detection-item .det-confidence {
            color: #4caf50;
            font-family: monospace;
            font-size: 11px;
        }

        .no-detections {
            color: #555;
            font-style: italic;
            font-size: 12px;
        }

        /* Controls bar */
        #controls-bar {
            height: 50px;
            background: #252525;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }

        #controls-bar button {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #ddd;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        #controls-bar button:hover { background: rgba(255,255,255,0.18); }
        #controls-bar button.active {
            background: rgba(76,175,80,0.5);
            color: #fff;
        }
        #controls-bar button.stop {
            background: rgba(244,67,54,0.5);
            color: #fff;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }

        .control-group label {
            white-space: nowrap;
        }

        .control-group input[type="range"] {
            width: 100px;
            accent-color: #4caf50;
        }

        .control-group .value {
            min-width: 32px;
            text-align: right;
            font-family: monospace;
            color: #ccc;
        }

        .control-spacer { flex: 1; }

        #plan-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
        }
        #plan-controls[hidden] { display: none; }
        #plan-waypoints {
            display: inline-flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 360px;
        }
        .wp-chip {
            background: rgba(255,152,0,0.18);
            border: 1px solid rgba(255,152,0,0.6);
            color: #ffb74d;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-family: monospace;
        }
        .wp-chip .wp-idx {
            color: #888;
            margin-right: 4px;
        }
        #plan-controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #plan-controls .render-sep {
            width: 1px; height: 18px; background: #333; margin: 0 4px;
        }
        #plan-controls label.rl {
            font-size: 11px; color: #aaa; display: inline-flex;
            align-items: center; gap: 4px;
        }
        #plan-controls input[type=text],
        #plan-controls input[type=number],
        #plan-controls select {
            background: rgba(255,255,255,0.06); border: 1px solid #333;
            color: #ddd; padding: 2px 4px; border-radius: 3px;
            font-family: monospace; font-size: 11px;
        }
        #render-progress {
            font-size: 11px; color: #ffb74d; font-family: monospace;
            min-width: 120px;
        }
        /* Orbit render strip in the bottom controls bar — same look as
           the plan-controls block so they sit consistently next to each
           other when both are visible. */
        #orbit-render-controls {
            display: flex; align-items: center; gap: 6px; min-height: 28px;
        }
        #orbit-render-controls[hidden] { display: none; }
        #orbit-render-controls .orbit-bar-label {
            color: #00d4d4; font-size: 11px; font-weight: 600;
        }
        #orbit-render-controls label.rl {
            font-size: 11px; color: #aaa; display: inline-flex;
            align-items: center; gap: 4px;
        }
        #orbit-render-controls input, #orbit-render-controls select {
            background: rgba(255,255,255,0.06); border: 1px solid #333;
            color: #ddd; padding: 2px 4px; border-radius: 3px;
            font-family: monospace; font-size: 11px;
        }
        #orbit-render-controls button {
            background: rgba(0,150,150,0.3); border: 1px solid #066;
            color: #cee; padding: 4px 10px; border-radius: 3px; cursor: pointer;
            font-size: 11px;
        }
        #orbit-render-controls button:disabled { opacity: 0.4; cursor: not-allowed; }
        #orbit-progress {
            font-size: 11px; color: #00d4d4; font-family: monospace; min-width: 120px;
        }

        /* Orbit-render panel — sits below the graph toolbar overlay */
        #orbit-controls {
            position: absolute; top: 8px; left: 220px; z-index: 10;
            background: rgba(20,20,20,0.92); border: 1px solid #333;
            border-radius: 4px; padding: 4px 8px;
            display: flex; align-items: center; gap: 6px; min-height: 28px;
        }
        #orbit-controls[hidden] { display: none; }
        #orbit-controls .orb-label { color: #00d4d4; font-size: 11px; font-weight: 600; }
        #orbit-controls label.rl {
            font-size: 11px; color: #aaa; display: inline-flex;
            align-items: center; gap: 4px;
        }
        #orbit-controls input, #orbit-controls select {
            background: rgba(255,255,255,0.06); border: 1px solid #333;
            color: #ddd; padding: 2px 4px; border-radius: 3px;
            font-family: monospace; font-size: 11px;
        }
        #orbit-controls button {
            background: rgba(0,150,150,0.3); border: 1px solid #066;
            color: #cee; padding: 4px 10px; border-radius: 3px; cursor: pointer;
            font-size: 11px;
        }
        #orbit-controls button:disabled { opacity: 0.4; cursor: not-allowed; }
        #orbit-progress {
            font-size: 11px; color: #00d4d4; font-family: monospace; min-width: 120px;
        }

        #target-display {
            font-size: 12px;
            color: #888;
        }

        #target-display span {
            color: #ff9800;
            font-weight: 500;
        }

        #fps-display {
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }

        #fps-display span {
            color: #4caf50;
        }

        /* Graph editor toolbar overlay on left panel */
        #graph-toolbar {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }

        #graph-toolbar button {
            background: rgba(30,30,30,0.85);
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        #graph-toolbar button:hover { background: rgba(60,60,60,0.9); color: #fff; }
        #graph-toolbar button.active { background: rgba(76,175,80,0.5); border-color: #4caf50; color: #fff; }
        #graph-toolbar .edit-submode { display: inline-flex; gap: 0; }
        #graph-toolbar .edit-submode button { border-radius: 0; }
        #graph-toolbar .edit-submode button:first-child { border-radius: 4px 0 0 4px; border-right-width: 0; }
        #graph-toolbar .edit-submode button:last-child { border-radius: 0 4px 4px 0; }
        #graph-toolbar .edit-submode button.active { background: rgba(0,180,180,0.45); border-color: #088; color: #fff; }

        #graph-toolbar select {
            background: rgba(30,30,30,0.85);
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        #graph-toolbar select option {
            background: #2a2a2a;
            color: #ccc;
        }

        /* Mode indicator overlay */
        #mode-indicator {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(30,30,30,0.85);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }

        #mode-indicator.editing { color: #ff9800; }

        /* Node info tooltip */
        #node-tooltip {
            position: absolute;
            background: rgba(20,20,20,0.95);
            color: #ddd;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            z-index: 20;
            border: 1px solid #444;
        }

        /* Loading overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,26,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-size: 16px;
            color: #888;
        }

        .hidden { display: none !important; }

        /* Headless mode: hide all UI chrome so screenshots capture only the
           render canvases. The right panel (Potree) becomes the full viewport
           when ?view=potree, and the left panel when ?view=mesh. */
        body.headless #header,
        body.headless #controls-bar,
        body.headless #graph-toolbar,
        body.headless #mode-indicator,
        body.headless #node-tooltip,
        body.headless #robot-camera-header,
        body.headless #detection-panel,
        body.headless #loading-overlay { display: none !important; }
        body.headless #main { top: 0 !important; bottom: 0 !important; }
        body.headless.view-potree #left-panel { display: none !important; }
        body.headless.view-potree #right-panel { width: 100% !important; }
        body.headless.view-mesh #right-panel { display: none !important; }
        body.headless.view-mesh #left-panel { width: 100% !important; }
    </style>
</head>
<body>
    <div id="header">
        Robot Patrol Simulator
        <select id="scene-select" title="Switch scene (full-page reload)"
                style="margin-left:14px; background:#222; color:#ddd; border:1px solid #444; padding:4px 8px; border-radius:3px; font-size:12px; max-width:380px;">
            <option value="">-- loading scenes --</option>
        </select>
        <div class="status-dot" id="connection-dot" title="Socket.IO disconnected"></div>
    </div>

    <div id="main">
        <!-- Left Panel: 3D Orbit Scene -->
        <div id="left-panel">
            <div id="orbit-canvas-container"></div>
            <div id="graph-toolbar">
                <button id="btn-edit-mode" title="Toggle graph editor">Edit Graph</button>
                <span id="edit-only-controls" class="edit-only" hidden>
                    <span class="edit-submode">
                        <button id="btn-mode-waypoints" class="active" title="Multi-node waypoint graph">Waypoints</button>
                        <button id="btn-mode-orbit" title="Single-node orbit (1 tip + 1 orbit)">Orbit</button>
                    </span>
                    <button id="btn-add-edge" title="Connect two nodes">Connect Nodes</button>
                    <button id="btn-set-start" title="Set selected node as start">Set Start</button>
                    <button id="btn-new-graph" title="Clear current graph">New Graph</button>
                    <button id="btn-save-graph" title="Save current graph">Save Graph</button>
                    <button id="btn-delete-graph" title="Delete a saved graph">Delete Graph</button>
                </span>
                <div id="edge-panel" style="display:none; margin-top:8px; padding:6px; border:1px solid #444; color:#ddd; font-size:12px;">
                    <div id="edge-panel-header" style="display:flex; gap:6px; align-items:center;">
                        <strong>Edge:</strong>
                        <span id="edge-panel-label">-</span>
                        <button id="edge-delete" type="button">Delete</button>
                    </div>
                    <label style="display:block; margin-top:4px;">
                        <input type="checkbox" id="edge-render" checked> Render this edge
                    </label>
                    <div id="edge-views" style="margin-top:4px;"></div>
                    <button id="edge-add-view" type="button">+ Add view</button>
                </div>
                <button id="btn-hide-walls" class="active" title="Clip near-side geometry">Hide Walls</button>
                <button id="btn-orient" title="Cycle scene orientation (saved per scene)">Orient ↻</button>
                <select id="graph-select" title="Load a saved graph">
                    <option value="">-- Load Graph --</option>
                </select>
            </div>
            <div id="orbit-controls" hidden>
                <span class="orb-label">Orbit:</span>
                <label class="rl">r <input type="number" id="orbit-radius" value="5" min="0.1" max="500" step="0.5" style="width:55px"> m</label>
                <label class="rl">h <input type="number" id="orbit-height" value="2" min="-200" max="200" step="0.5" style="width:55px"> m</label>
                <label class="rl">n <input type="number" id="orbit-samples" value="36" min="3" max="360" step="1" style="width:48px"></label>
                <span style="opacity:0.6; font-size:11px">drag the orange handle to set start angle</span>
            </div>
            <div id="mode-indicator">Navigate: orbit view</div>
            <div id="node-tooltip"></div>
            <div id="loading-overlay">Loading mesh...</div>
        </div>

        <!-- Right Panel: Robot Camera -->
        <div id="right-panel">
            <div id="robot-camera-section">
                <div id="robot-camera-header">
                    <span>Robot Camera</span>
                    <div class="toggle-group">
                        <button id="btn-view-potree" class="active">Potree</button>
                        <button id="btn-view-yolo">YOLO View</button>
                    </div>
                </div>
                <div id="robot-camera-wrapper">
                    <div id="robot-canvas-container"></div>
                    <img id="annotated-image" alt="Annotated frame">
                    <iframe id="potree-frame" src="/static/potree-view.html"
                            style="visibility:hidden; pointer-events:none; position:absolute; inset:0; width:100%; height:100%; border:0; background:#111;"></iframe>
                </div>
            </div>
            <div id="detection-panel">
                <div class="det-header">
                    <span>Detections</span>
                    <span id="det-count">0</span>
                </div>
                <div id="detection-list">
                    <div class="no-detections">No detections</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls Bar -->
    <div id="controls-bar">
        <button id="btn-start-stop">Start</button>
        <div class="control-group" id="route-mode-group">
            <label>Route</label>
            <button id="btn-mode-interactive" class="active" title="Click a node to navigate">Interactive</button>
            <button id="btn-mode-plan" title="Build a multi-waypoint plan, then press Start">Plan</button>
        </div>
        <div id="orbit-render-controls" hidden>
            <span class="orbit-bar-label">Orbit:</span>
            <label class="rl">name <input type="text" id="orbit-name" value="orbit01" size="10"></label>
            <label class="rl">quality
                <select id="orbit-quality">
                    <option value="standard">standard</option>
                    <option value="high" selected>high</option>
                    <option value="ultra">ultra</option>
                </select>
            </label>
            <label class="rl" title="Override the quality preset's stable-frames count (blank = preset default)">stable
                <input type="number" id="orbit-stable" min="1" max="120" step="1" placeholder="auto" style="width:48px">
            </label>
            <button id="btn-orbit-render" disabled title="Render PNGs around the orbit circle">Render Orbit</button>
            <span id="orbit-progress"></span>
        </div>
        <div id="plan-controls" hidden>
            <span id="plan-waypoints" title="Waypoints in order"></span>
            <button id="btn-plan-clear" disabled>Clear</button>
            <span class="render-sep"></span>
            <label class="rl">name <input type="text" id="render-name" value="route01" size="10"></label>
            <label class="rl">step <input type="number" id="render-spacing" value="1.0" min="0.1" step="0.1" style="width:48px"> m</label>
            <label class="rl">quality
                <select id="render-quality">
                    <option value="standard">standard</option>
                    <option value="high" selected>high</option>
                    <option value="ultra">ultra</option>
                </select>
            </label>
            <button id="btn-plan-render" disabled title="Render PNGs along the path">Render</button>
            <span id="render-progress"></span>
        </div>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1.0">
            <span class="value" id="speed-value">1.0</span>
        </div>
        <div id="target-display">Target: <span id="target-name">None</span></div>
        <div class="control-spacer"></div>
        <div id="fps-display">FPS: <span id="fps-value">0</span></div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

        // ========================================================================
        // STATE
        // ========================================================================

        // Graph data: nodes and edges
        let graphNodes = [];       // [{id, position: [x,y,z]}]
        let graphEdges = [];       // [{from, to, render?: bool, views?: [{roll_deg}]}]
        let selectedEdgeKey = null;
        let graphNodeMeshes = {};  // id -> THREE.Mesh
        let graphEdgeLines = [];   // THREE.Line objects in scene
        let graphViewCones = [];   // THREE.Mesh cone handles for per-edge views
        let startNodeId = null;    // designated start node

        // Robot state
        let robotPosition = new THREE.Vector3(0, 0.5, 0);
        let robotYaw = 0;
        let robotPitch = 0;
        let robotPath = [];            // node IDs from server
        let robotPathPositions = [];   // resolved Vector3 positions
        let robotMoving = false;
        let robotSpeed = 1.0;
        let robotDelta = 1 / 60;  // frame delta in seconds
        let robotCurrentNode = null;   // last node the robot arrived at

        // ── Headless mode parameters (driven by Playwright) ────────────────
        const URL_PARAMS = new URLSearchParams(window.location.search);
        const HEADLESS = URL_PARAMS.get('headless') === '1';
        const HEADLESS_PLAN = (URL_PARAMS.get('plan') || '').split(',').map(s => s.trim()).filter(Boolean);
        const HEADLESS_GRAPH = URL_PARAMS.get('graph') || null;
        const HEADLESS_VIEW = URL_PARAMS.get('view') || 'potree';
        const HEADLESS_SPEED = parseFloat(URL_PARAMS.get('speed') || '2.0');

        // ── Active scene ─────────────────────────────────────────────────
        // `?scene=` selects which scene under SCENES_ROOT to load. When
        // missing the server picks the most-recently-used (or first
        // alphabetical) — we still propagate "" so URLs stay shareable.
        const ACTIVE_SCENE = URL_PARAMS.get('scene') || '';
        const SCENE_QS = ACTIVE_SCENE ? `?scene=${encodeURIComponent(ACTIVE_SCENE)}` : '';

        // Auto-inject ?scene= into all backend calls. Cheaper than threading
        // it through every fetch site. Targets /api/* and /mesh.glb only —
        // /static/* and /scenes/<name>/* already encode scope in the path.
        // /api/scenes is excluded — it lists scenes, doesn't operate on one.
        const _origFetch = window.fetch.bind(window);
        if (ACTIVE_SCENE) {
            window.fetch = (input, init) => {
                const url = typeof input === 'string' ? input : (input?.url || '');
                const needsScene = (url.startsWith('/api/') && !url.startsWith('/api/scenes'))
                                   || url === '/mesh.glb' || url.startsWith('/mesh.glb?');
                if (!needsScene || url.includes('scene=')) return _origFetch(input, init);
                const sep = url.includes('?') ? '&' : '?';
                const scoped = url + sep + 'scene=' + encodeURIComponent(ACTIVE_SCENE);
                return _origFetch(typeof input === 'string' ? scoped : new Request(scoped, input), init);
            };
        }

        // ── Scene picker ───────────────────────────────────────────────────
        function _fmtAgo(ts) {
            if (!ts) return null;
            const diff = (Date.now() / 1000) - ts;
            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.round(diff / 60) + 'm ago';
            if (diff < 86400) return Math.round(diff / 3600) + 'h ago';

        function _setSelectPlaceholder(sel, label) {

        const robotCanvasContainer = document.getElementById('robot-canvas-container');

        robotRenderer.setPixelRatio(1); // Fixed resolution for streaming
        robotCanvasContainer.appendChild(robotRenderer.domElement);

        // ========================================================================
        // MESH LOADING
        // ========================================================================

        const gltfLoader = new GLTFLoader();
        // Decode Meshopt + Draco compressed GLBs produced by scripts/optimize_mesh.py.
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
        gltfLoader.setDRACOLoader(dracoLoader);
        gltfLoader.setMeshoptDecoder(MeshoptDecoder);
        const loadingOverlay = document.getElementById('loading-overlay');

        // Orientation presets: 6 axis-aligned "up" directions.
        // Each entry is an Euler rotation (XYZ order) applied to the mesh.
        const ORIENTATION_PRESETS = [
            { name: 'Y+', rot: [0, 0, 0] },
            { name: 'Z+', rot: [-Math.PI / 2, 0, 0] },
            { name: 'X+', rot: [0, 0, Math.PI / 2] },
            { name: 'Y-', rot: [Math.PI, 0, 0] },
            { name: 'Z-', rot: [Math.PI / 2, 0, 0] },
            { name: 'X-', rot: [0, 0, -Math.PI / 2] },
        ];
        let orientationIndex = 0;

        function autoDetectOrientationIndex(mesh) {
            // Save then clear rotation to measure raw bbox.
            const prev = mesh.rotation.clone();
            mesh.rotation.set(0, 0, 0);
            mesh.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(mesh);
            const s = box.getSize(new THREE.Vector3());
            mesh.rotation.copy(prev);
            mesh.updateMatrixWorld(true);
            if (s.z < s.x && s.z < s.y) return 1; // Z+ up
            if (s.x < s.y && s.x < s.z) return 2; // X+ up
            return 0;                              // Y+ up (default)
        }

        function applyOrientation(idx) {
            if (!fullMesh) return;
            const r = ORIENTATION_PRESETS[idx].rot;
            fullMesh.rotation.set(r[0], r[1], r[2]);
            fullMesh.updateMatrixWorld(true);
            if (noWallsMesh) {
                noWallsMesh.rotation.set(r[0], r[1], r[2]);
                noWallsMesh.updateMatrixWorld(true);
            }

            const box = new THREE.Box3().setFromObject(fullMesh);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            meshBBox = box;
            window._debugBBox = {min:{x:box.min.x,y:box.min.y,z:box.min.z}, max:{x:box.max.x,y:box.max.y,z:box.max.z}, size:{x:size.x,y:size.y,z:size.z}};

            orbitControls.target.copy(center);
            orbitCamera.position.set(
                center.x + size.x * 0.8,
                center.y + size.y * 1.5,
                center.z + size.z * 0.8
            );
            orbitControls.update();

            floorPlane.position.set(center.x, box.min.y, center.z);
            gridHelper.position.y = box.min.y;

            robotPosition.set(center.x, box.min.y + 0.01, center.z);
            robotGroup.position.copy(robotPosition);
            updateRobotCamera();

            const btn = document.getElementById('btn-orient');
            if (btn) btn.textContent = 'Orient ' + ORIENTATION_PRESETS[idx].name;
        }

        async function persistOrientation(idx) {
            try {
                await fetch('/api/orientation', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ index: idx }),
                });
            } catch (e) { console.warn('Could not persist orientation:', e); }
        }

        gltfLoader.load(
            '/mesh.glb' + SCENE_QS,
            async (gltf) => {
                const mesh = gltf.scene;
                mesh.traverse((obj) => {
                    if (obj.isMesh && obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        for (const m of mats) {
                            if (obj.geometry?.attributes?.color) m.vertexColors = true;
                            m.side = THREE.DoubleSide;
                            m.needsUpdate = true;
                        }
                    }
                });

                orbitScene.add(mesh);
                collisionMesh = mesh;
                fullMesh = mesh;
                groundYCache.clear();  // any fallback Ys cached pre-mesh are now stale
                window._debugMesh = mesh;

                // Pick orientation: saved override → auto-detect.
                let savedIdx = null;
                try {
                    const r = await fetch('/api/orientation');
                    const data = await r.json();
                    if (data && Number.isInteger(data.index)) savedIdx = data.index;

                orientationIndex = savedIdx !== null ? savedIdx : autoDetectOrientationIndex(mesh);

                // graph the server already has in memory.
                fetchGraphList().then(async () => {
                    const select = document.getElementById('graph-select');
                    if (HEADLESS && HEADLESS_GRAPH) {

                    } else {

            },
            (progress) => {

        );

        // ========================================================================
        // NAVIGATION GRAPH RENDERING
        // ========================================================================

        const nodeGeometry = new THREE.SphereGeometry(0.15, 12, 12);
        const postGeometry = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
        const postMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
        const nodeMaterialDefault = new THREE.MeshPhongMaterial({ color: 0x44cc44 });
        const nodeMaterialHovered = new THREE.MeshPhongMaterial({ color: 0x88ff88 });
        const nodeMaterialSelected = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
        const nodeMaterialTarget = new THREE.MeshPhongMaterial({ color: 0xff4444 });
        const nodeMaterialStart = new THREE.MeshPhongMaterial({ color: 0x2196f3 });
        const edgeMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.7 });
        const edgeMaterialDefault = edgeMaterial; // keep original reference
        const edgeMaterialWithViews = new THREE.MeshPhongMaterial({ color: 0x55ddee, transparent: true, opacity: 0.85 });
        const edgeMaterialSkipped = new THREE.MeshPhongMaterial({ color: 0x666666, transparent: true, opacity: 0.35 });
        const edgeMaterialSelected = new THREE.MeshPhongMaterial({ color: 0xffaa00, transparent: true, opacity: 0.95 });
        const pathHighlightMaterial = new THREE.MeshPhongMaterial({ color: 0x00aaff });

        // Group for all graph objects
        const graphGroup = new THREE.Group();
        orbitScene.add(graphGroup);

        // Active path highlight lines
        let pathHighlightLines = [];

        const NODE_HEIGHT = 0.5;  // default lift above floor for new nodes
        const EDGE_RADIUS = 0.05; // tube radius for edges (thicker = easier to click)
        const VIEW_CONE_RADIUS = 0.04;
        const VIEW_CONE_LENGTH = 0.25;
        const edgeMaterialSkippedDashed = new THREE.LineDashedMaterial({
            color: 0x888888, dashSize: 0.15, gapSize: 0.10, transparent: true, opacity: 0.6,
        });
        const edgeMaterialSkippedSelectedDashed = new THREE.LineDashedMaterial({
            color: 0xffaa00, dashSize: 0.15, gapSize: 0.10, transparent: true, opacity: 0.95,
        });
        const viewConeMaterial = new THREE.MeshBasicMaterial({ color: 0x55ddee });

        // Reusable raycaster for ground sampling — separate from the
        // global `raycaster` so we don't trample mouse-pick state.
        const groundRaycaster = new THREE.Raycaster();
        const GROUND_RAY_FROM = new THREE.Vector3();
        const GROUND_RAY_DIR = new THREE.Vector3(0, -1, 0);

        // Ground-Y cache: raycasting collisionMesh (millions of tris) per
        // node every renderGraph froze the UI during drags. Key by
        // cm-rounded (x,z); invalidate when a node's X/Z changes.
        const groundYCache = new Map();
        const groundKey = (x, z) => `${Math.round(x * 100)}|${Math.round(z * 100)}`;
        function _edgeKey(e) { return e.from < e.to ? `${e.from}|${e.to}` : `${e.to}|${e.from}`; }

        function getGroundYAt(x, z, fallbackY) {
            const key = groundKey(x, z);
            const cached = groundYCache.get(key);
            if (cached !== undefined) return cached;
            GROUND_RAY_FROM.set(x, 1e4, z);
            groundRaycaster.set(GROUND_RAY_FROM, GROUND_RAY_DIR);
            let y = fallbackY;
            if (collisionMesh) {
                const hits = groundRaycaster.intersectObject(collisionMesh, true);
                if (hits.length > 0) y = hits[0].point.y;
            } else if (typeof floorPlane !== 'undefined' && floorPlane) {
                const fhits = groundRaycaster.intersectObject(floorPlane, false);
                if (fhits.length > 0) y = fhits[0].point.y;
            }
            groundYCache.set(key, y);
            return y;
        }

        // ── Edge view geometry helpers ──────────────────────────────
        // Build the edge-local frame: forward (traversal dir), up_perp
        // (world-up projected onto plane ⟂ forward), right_perp.
        // Degenerate near-vertical edges fall back to +X as up_perp.
        function _edgeFrame(fromVec3, toVec3) {
            const forward = toVec3.clone().sub(fromVec3).normalize();
            const worldUp = new THREE.Vector3(0, 1, 0);
            let upPerp;
            if (Math.abs(worldUp.dot(forward)) > 0.99) {
                upPerp = new THREE.Vector3(1, 0, 0);
                upPerp.sub(forward.clone().multiplyScalar(forward.dot(upPerp))).normalize();
            } else {
                upPerp = worldUp.clone().sub(forward.clone().multiplyScalar(worldUp.dot(forward))).normalize();
            }
            const rightPerp = forward.clone().cross(upPerp).normalize();
            return { forward, upPerp, rightPerp };
        }

        // Map a roll_deg around the edge axis to a unit look direction.
        // 0° = upPerp, 90° = rightPerp, 180° = -upPerp, 270° = -rightPerp.
        function _rollToLookDir(rollDeg, frame) {
            const r = (rollDeg * Math.PI) / 180.0;
            return frame.upPerp.clone().multiplyScalar(Math.cos(r))
                .add(frame.rightPerp.clone().multiplyScalar(Math.sin(r)));
        }

        // Inverse: given a vector v in the perpendicular plane, recover roll_deg.
        function _lookDirToRoll(v, frame) {
            const x = v.dot(frame.upPerp);
            const y = v.dot(frame.rightPerp);
            let deg = Math.atan2(y, x) * 180.0 / Math.PI;
            return ((deg % 360) + 360) % 360;
        }

        function _makeViewCone(midVec3, lookDir, edgeFrom, edgeTo, viewIndex) {
            const coneGeom = new THREE.ConeGeometry(VIEW_CONE_RADIUS, VIEW_CONE_LENGTH, 12);
            const cone = new THREE.Mesh(coneGeom, viewConeMaterial);
            // ConeGeometry default axis is +Y; we want the cone tip to point along lookDir.
            // Translate up by half-length so the base sits at the midpoint and the tip extends out.
            coneGeom.translate(0, VIEW_CONE_LENGTH / 2, 0);
            cone.position.copy(midVec3);
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), lookDir.clone().normalize());
            cone.userData = {
                kind: 'edgeView',
                edgeFrom,
                edgeTo,
                viewIndex,
            };
            return cone;
        }

        function renderGraph() {
            // Clear existing graph visuals
            while (graphGroup.children.length > 0) {
                graphGroup.remove(graphGroup.children[0]);
            }
            graphNodeMeshes = {};
            graphEdgeLines = [];
            graphViewCones = [];

            // Render nodes with posts
            for (const node of graphNodes) {
                const x = node.position[0];
                const y = node.position[1];
                const z = node.position[2];

                // Sphere (the "viewpoint") — sits NODE_HEIGHT above y by
                // default, but Ctrl-drag lifts it freely up into the sky.
                const sphereY = y + NODE_HEIGHT;

                // Post stretches from the actual ground under (x,z) up
                // to the sphere, so it grows/shrinks with the lift.
                const groundY = getGroundYAt(x, z, y);
                const postLen = Math.max(0.001, sphereY - groundY);
                const post = new THREE.Mesh(postGeometry, postMaterial);
                post.position.set(x, groundY + postLen / 2, z);
                post.scale.y = postLen;
                graphGroup.add(post);

                // Node sphere at top of post
                const mesh = new THREE.Mesh(nodeGeometry, nodeMaterialDefault.clone());
                mesh.position.set(x, sphereY, z);
                mesh.userData.nodeId = node.id;
                graphGroup.add(mesh);
                graphNodeMeshes[node.id] = mesh;
            }

            // Render edges as tubes raised to node height
            for (const edge of graphEdges) {
                const fromNode = graphNodes.find(n => n.id === edge.from);
                const toNode = graphNodes.find(n => n.id === edge.to);
                if (!fromNode || !toNode) continue;

                const from = new THREE.Vector3(
                    fromNode.position[0], fromNode.position[1] + NODE_HEIGHT, fromNode.position[2]
                );
                const to = new THREE.Vector3(
                    toNode.position[0], toNode.position[1] + NODE_HEIGHT, toNode.position[2]
                );

                // Cylinder between the two points
                const dir = to.clone().sub(from);
                const length = dir.length();
                const mid = from.clone().add(to).multiplyScalar(0.5);

                const isSelected = selectedEdgeKey && _edgeKey(edge) === selectedEdgeKey;
                if (edge.render === false) {
                    // Render-skipped edges: dashed line, no tube. Selected variant keeps the
                    // dashing but tints orange. The faded line stays pickable via the
                    // edge selection raycast (we still record an invisible tube below).
                    const lineGeom = new THREE.BufferGeometry().setFromPoints([from, to]);
                    const line = new THREE.Line(lineGeom, isSelected ? edgeMaterialSkippedSelectedDashed : edgeMaterialSkippedDashed);
                    line.computeLineDistances();
                    line.userData.edgeFrom = edge.from;
                    line.userData.edgeTo = edge.to;
                    graphGroup.add(line);

                    // Invisible thicker tube for picking (so skipped edges remain clickable)
                    const pickGeom = new THREE.CylinderGeometry(EDGE_RADIUS, EDGE_RADIUS, length, 6);
                    const pickMat = new THREE.MeshBasicMaterial({ visible: false });
                    const pickCyl = new THREE.Mesh(pickGeom, pickMat);
                    pickCyl.position.copy(mid);
                    pickCyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                    pickCyl.userData.edgeFrom = edge.from;
                    pickCyl.userData.edgeTo = edge.to;
                    graphGroup.add(pickCyl);
                    graphEdgeLines.push(pickCyl);
                } else {
                    const cylGeom = new THREE.CylinderGeometry(EDGE_RADIUS, EDGE_RADIUS, length, 6);
                    let mat;
                    if (isSelected) {
                        mat = edgeMaterialSelected;
                    } else if (edge.views && edge.views.length > 0) {
                        mat = edgeMaterialWithViews;
                    } else {
                        mat = edgeMaterialDefault;
                    }
                    const cyl = new THREE.Mesh(cylGeom, mat);
                    cyl.position.copy(mid);
                    cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
                    cyl.userData.edgeFrom = edge.from;
                    cyl.userData.edgeTo = edge.to;
                    graphGroup.add(cyl);
                    graphEdgeLines.push(cyl);
                }

                // Cone glyphs: one per view, anchored at edge midpoint, pointing
                // radially out along the look direction implied by roll_deg.
                if (edge.views && edge.views.length > 0) {
                    const frame = _edgeFrame(from, to);
                    for (let vi = 0; vi < edge.views.length; vi++) {
                        const view = edge.views[vi];
                        const look = _rollToLookDir(view.roll_deg, frame);
                        const cone = _makeViewCone(mid, look, edge.from, edge.to, vi);
                        graphGroup.add(cone);
                        graphViewCones.push(cone);
                    }
                }
            }

            updateNodeVisuals();
        }

        function updateNodeVisuals() {
            for (const node of graphNodes) {
                const mesh = graphNodeMeshes[node.id];
                if (!mesh) continue;

                if (node.id === currentTargetNodeId) {
                    mesh.material = nodeMaterialTarget;
                    mesh.scale.setScalar(1.3);
                } else if (node.id === selectedNodeId) {
                    mesh.material = nodeMaterialSelected;
                    mesh.scale.setScalar(1.2);
                } else if (node.id === hoveredNodeId) {
                    mesh.material = nodeMaterialHovered;
                    mesh.scale.setScalar(1.1);
                } else if (node.id === startNodeId) {
                    mesh.material = nodeMaterialStart;
                    mesh.scale.setScalar(1.2);
                } else {
                    mesh.material = nodeMaterialDefault.clone();
                    mesh.scale.setScalar(1.0);
                }
            }
            // Orbit preview tracks the selected node — refresh whenever
            // selection visuals are touched. Guarded for early init order
            // (this is defined before updateOrbitPreview is hoisted).
            if (typeof updateOrbitPreview === 'function') updateOrbitPreview();
        }

        function clearPathHighlight() {
            for (const line of pathHighlightLines) {
                graphGroup.remove(line);
            }
            pathHighlightLines = [];
        }

        function highlightPath(nodeIds) {
            clearPathHighlight();

            for (let i = 0; i < nodeIds.length - 1; i++) {
                const fromNode = graphNodes.find(n => n.id === nodeIds[i]);
                const toNode = graphNodes.find(n => n.id === nodeIds[i + 1]);
                if (!fromNode || !toNode) continue;

                const from = new THREE.Vector3(
                    fromNode.position[0], fromNode.position[1] + NODE_HEIGHT + 0.05, fromNode.position[2]
                );
                const to = new THREE.Vector3(
                    toNode.position[0], toNode.position[1] + NODE_HEIGHT + 0.05, toNode.position[2]
                );
                const dir = to.clone().sub(from);
                const length = dir.length();
                const mid = from.clone().add(to).multiplyScalar(0.5);

                const cylGeom = new THREE.CylinderGeometry(EDGE_RADIUS * 1.5, EDGE_RADIUS * 1.5, length, 6);
                const cyl = new THREE.Mesh(cylGeom, pathHighlightMaterial);
                cyl.position.copy(mid);
                cyl.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0), dir.clone().normalize()
                );
                graphGroup.add(cyl);
                pathHighlightLines.push(cyl);
            }
        }

        // ========================================================================
        // CATMULL-ROM SPLINE INTERPOLATION (from indoor-walk)
        // ========================================================================

        function catmullRomSpline(points, segments) {
            if (!segments) segments = 20;
            if (points.length < 2) return points.slice();
            if (points.length === 2) {
                const result = [];
                for (let t = 0; t <= 1; t += 1 / segments) {
                    result.push(points[0].clone().lerp(points[1], t));
                }
                return result;
            }

            // Add phantom points at start and end
            const extended = [
                points[0].clone().sub(points[1].clone().sub(points[0])),
                ...points,
                points[points.length - 1].clone().add(
                    points[points.length - 1].clone().sub(points[points.length - 2])
                )
            ];

            const result = [];
            for (let i = 1; i < extended.length - 2; i++) {
                const p0 = extended[i - 1];
                const p1 = extended[i];
                const p2 = extended[i + 1];
                const p3 = extended[i + 2];
                const isLast = i === extended.length - 3;

                for (let j = 0; j < segments; j++) {
                    if (!isLast && j === segments - 1) continue;
                    const t = j / segments;
                    const t2 = t * t;
                    const t3 = t2 * t;

                    const x = 0.5 * (
                        (2 * p1.x) +
                        (-p0.x + p2.x) * t +
                        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
                    );
                    const y = 0.5 * (
                        (2 * p1.y) +
                        (-p0.y + p2.y) * t +
                        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
                    );
                    const z = 0.5 * (
                        (2 * p1.z) +
                        (-p0.z + p2.z) * t +
                        (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 +
                        (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3
                    );

                    result.push(new THREE.Vector3(x, y, z));
                }
            }
            result.push(points[points.length - 1].clone());
            return result;
        }

        function samplePathByDistance(points, speed, dt) {
            if (points.length < 2) {
                return points.map(p => ({
                    pos: p,
                    dir: new THREE.Vector3(0, 0, -1)
                }));
            }

            const samples = [];
            let totalDist = 0;
            const segmentLengths = [];

            for (let i = 1; i < points.length; i++) {
                const len = points[i].distanceTo(points[i - 1]);
                segmentLengths.push(len);
                totalDist += len;
            }

            const stepDist = speed * dt;
            let currentDist = 0;
            let segIdx = 0;
            let segStart = 0;

            while (currentDist <= totalDist) {
                while (segIdx < segmentLengths.length - 1 &&
                       currentDist - segStart > segmentLengths[segIdx]) {
                    segStart += segmentLengths[segIdx];
                    segIdx++;
                }

                const segLen = segmentLengths[segIdx];
                const t = segLen > 0 ? (currentDist - segStart) / segLen : 0;
                const pos = points[segIdx].clone().lerp(
                    points[segIdx + 1],
                    Math.min(1, Math.max(0, t))
                );
                const dir = points[segIdx + 1].clone().sub(points[segIdx]).normalize();

                samples.push({ pos, dir });
                currentDist += stepDist;
            }

            // Final sample at end
            samples.push({
                pos: points[points.length - 1].clone(),
                dir: samples.length > 0
                    ? samples[samples.length - 1].dir.clone()
                    : new THREE.Vector3(0, 0, -1)
            });

            return samples;
        }

        // ========================================================================
        // ROBOT MOVEMENT
        // ========================================================================

        // Index into robotPathPositions: the node we're currently moving toward
        let robotPathTargetIdx = 0;

        function startRobotMovement(nodeIds) {
            robotPath = nodeIds;

            // Resolve node IDs to 3D positions
            robotPathPositions = [];
            for (const id of nodeIds) {
                const node = graphNodes.find(n => n.id === id);
                if (node) {
                    robotPathPositions.push(
                        new THREE.Vector3(node.position[0], node.position[1], node.position[2])
                    );
                }
            }

            if (robotPathPositions.length < 2) {
                console.warn('Path too short for movement');
                return;
            }

            // Highlight path in orbit view
            highlightPath(nodeIds);

            // Start linear node-to-node movement
            robotPathTargetIdx = 1;
            robotMoving = true;

            document.getElementById('target-name').textContent = nodeIds[nodeIds.length - 1];
            currentTargetNodeId = nodeIds[nodeIds.length - 1];
            updateNodeVisuals();
        }

        function updateRobotMovement() {
            if (!robotMoving || robotPathPositions.length === 0) return;

            if (robotPathTargetIdx >= robotPathPositions.length) {
                // Arrived at final node
                robotMoving = false;
                clearPathHighlight();

                const finalPos = robotPathPositions[robotPathPositions.length - 1];
                robotPosition.copy(finalPos);
                robotCurrentNode = robotPath[robotPath.length - 1];

                currentTargetNodeId = null;
                document.getElementById('target-name').textContent = 'None';
                if (planActive) {
                    planActive = false;
                    planWaypoints = [];
                    refreshPlanUI();
                    window.__planDone = true;
                }
                updateNodeVisuals();
                return;
            }

            const target = robotPathPositions[robotPathTargetIdx];
            const dx = target.x - robotPosition.x;
            const dy = target.y - robotPosition.y;
            const dz = target.z - robotPosition.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

            // Distance to move this frame (speed is units/sec, delta comes from animate loop)
            const stepDist = robotSpeed * robotDelta;

            if (dist <= stepDist) {
                // Snap to this node and advance to next segment
                robotPosition.copy(target);
                if (dist > 1e-6) {
                    robotYaw = Math.atan2(-dx, -dz);
                }
                // Track which node we just arrived at
                robotCurrentNode = robotPath[robotPathTargetIdx];
                robotPathTargetIdx++;

                // If there's a pending re-target, repath from this node
                if (pendingTarget) {
                    const newTarget = pendingTarget;
                    pendingTarget = null;
                    robotMoving = false;
                    clearPathHighlight();
                    socket.emit('robot_command', {
                        target: newTarget,
                        from_node: robotCurrentNode
                    });
                    return;
                }
            } else {
                // Move toward the target node
                const frac = stepDist / dist;
                robotPosition.x += dx * frac;
                robotPosition.y += dy * frac;
                robotPosition.z += dz * frac;
                robotYaw = Math.atan2(-dx, -dz);
            }
        }

        function updateRobotMarker() {
            robotGroup.position.copy(robotPosition);
            robotGroup.rotation.y = robotYaw;
        }

        function updateRobotCamera() {
            // Position camera at robot's camera location
            robotCamera.position.set(
                robotPosition.x,
                robotPosition.y + 1.0,
                robotPosition.z
            );
            robotCamera.rotation.order = 'YXZ';
            robotCamera.rotation.y = robotYaw;
            robotCamera.rotation.x = robotPitch;

            // Mirror the robot pose into the Potree iframe (right panel).
            sendPotreePose();
        }

        // ─── Potree iframe glue ────────────────────────────────────────────
        const potreeFrame = document.getElementById('potree-frame');
        let potreeReady = false;
        let potreeViewActive = false;
        let pointcloudUrl = null;

        function postToPotree(msg) {
            if (!potreeReady || !potreeFrame.contentWindow) return;
            potreeFrame.contentWindow.postMessage(msg, '*');
        }

        function sendPotreePose() {
            if (!potreeViewActive || !potreeReady) return;
            // While an orbit render is sweeping the camera around the tip,
            // the per-frame robot pose would clobber every orbit pose
            // before Potree had a chance to render it (the animation loop
            // fires faster than the iframe re-renders), causing every
            // captured frame to be byte-identical. Yield to the orbit.
            if (orbitActive) return;
            // Forward vector from yaw/pitch (matches robotCamera.rotation YXZ).
            const cy = Math.cos(robotPitch), sy = Math.sin(robotPitch);
            const cx = Math.cos(robotYaw),   sx = Math.sin(robotYaw);
            const fx = -sx * cy;
            const fy =  sy;
            const fz = -cx * cy;
            const px = robotPosition.x, py = robotPosition.y + 1.0, pz = robotPosition.z;
            const r = ORIENTATION_PRESETS[orientationIndex].rot;
            postToPotree({
                type: 'pose',
                position: [px, py, pz],
                target:   [px + fx, py + fy, pz + fz],
                fov: 60,
                near: 0.1,
                far: 500,
                orientationEuler: r,
            });
        }

        // Pending capture promises keyed by id.
        const _pendingCaptures = new Map();
        function captureFromPotree({ maxMs = 8000, stableFrames = 8, parentTimeoutMs = 20000 } = {}) {
            return new Promise((resolve, reject) => {
                if (!potreeReady) return reject(new Error('Potree not ready'));
                const id = 'cap_' + Math.random().toString(36).slice(2, 9);
                const timer = setTimeout(() => {
                    _pendingCaptures.delete(id);
                    reject(new Error('capture timeout'));
                }, parentTimeoutMs);
                _pendingCaptures.set(id, { resolve, reject, timer });
                postToPotree({ type: 'capture', id, maxMs, stableFrames });
            });
        }

        window.addEventListener('message', (ev) => {
            if (ev.source !== potreeFrame.contentWindow) return;
            const msg = ev.data;
            if (!msg || typeof msg !== 'object') return;
            if (msg.type === 'ready') {
                potreeReady = true;
                if (pointcloudUrl) postToPotree({ type: 'load', url: pointcloudUrl });
                // Re-evaluate buttons that depend on Potree readiness.
                if (typeof updateOrbitPreview === 'function') updateOrbitPreview();
            } else if (msg.type === 'pointcloud_loaded') {
                sendPotreePose();
            } else if (msg.type === 'pointcloud_error') {
                console.warn('Potree pointcloud error:', msg.error, msg.url);
            } else if (msg.type === 'capture_result') {
                const pending = _pendingCaptures.get(msg.id);
                if (pending) {
                    clearTimeout(pending.timer);
                    _pendingCaptures.delete(msg.id);
                    if (msg.error) pending.reject(new Error(msg.error));
                    else pending.resolve({ dataUrl: msg.dataUrl, stats: msg.stats, intrinsics: msg.intrinsics });
                }
            }
        });

        // Discover the pointcloud URL for the active scene; iframe loads on ready.
        fetch('/api/scene_info')
            .then(r => r.json())
            .then(info => {
                pointcloudUrl = info.pointcloud_url;
                if (potreeReady && pointcloudUrl) postToPotree({ type: 'load', url: pointcloudUrl });
            })
            .catch(e => console.warn('scene_info fetch failed:', e));

        // ========================================================================
        // FRAME STREAMING
        // ========================================================================

        function captureAndSendFrame() {
            if (!isStreaming) return;

            const now = performance.now();
            if (now - lastFrameTime < FRAME_INTERVAL_MS) return;
            lastFrameTime = now;

            // Render robot camera with full scene (both meshes), robot and graph hidden
            robotGroup.visible = false;
            graphGroup.visible = false;
            const savedWallsVis = fullMesh ? fullMesh.visible : true;
            if (fullMesh) fullMesh.visible = true;
            robotRenderer.render(robotScene, robotCamera);
            if (fullMesh) fullMesh.visible = savedWallsVis;
            graphGroup.visible = true;
            robotGroup.visible = true;

            // Capture as JPEG
            const dataUrl = robotRenderer.domElement.toDataURL('image/jpeg', 0.8);

            // Send via socket
            socket.emit('frame', { image: dataUrl });
        }

        // ========================================================================
        // GRAPH EDITOR -- RAYCASTING
        // ========================================================================

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getMousePosition(event, container) {
            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function getNodeAtMouse(event) {
            getMousePosition(event, orbitContainer);
            raycaster.setFromCamera(mouse, orbitCamera);

            const nodeMeshes = Object.values(graphNodeMeshes);
            if (nodeMeshes.length === 0) return null;

            const intersects = raycaster.intersectObjects(nodeMeshes, false);
            if (intersects.length > 0) {
                return intersects[0].object.userData.nodeId;
            }
            return null;
        }

        function getEdgeAtMouse(event) {
            // Returns { from, to } of the edge under the cursor, or null.
            // Raycasts a slightly fattened set of edge cylinders so users
            // don't have to hit the visual 2cm tube exactly.
            getMousePosition(event, orbitContainer);
            raycaster.setFromCamera(mouse, orbitCamera);
            // Raycaster.params.Line tolerance is irrelevant for Mesh; widen
            // by temporarily scaling cylinders' picking via raycaster instead:
            // simplest is just to test against the cylinders directly.
            if (graphEdgeLines.length === 0) return null;
            const hits = raycaster.intersectObjects(graphEdgeLines, false);
            if (hits.length === 0) return null;
            const ud = hits[0].object.userData;
            return { from: ud.edgeFrom, to: ud.edgeTo };
        }

        // ── Edge panel ──────────────────────────────────────────────────────
        const edgePanel = document.getElementById('edge-panel');
        const edgePanelLabel = document.getElementById('edge-panel-label');
        const edgeRenderCheckbox = document.getElementById('edge-render');
        const edgeViewsContainer = document.getElementById('edge-views');
        const edgeDeleteBtn = document.getElementById('edge-delete');
        const edgeAddViewBtn = document.getElementById('edge-add-view');

        function _findEdgeByKey(key) {
            return graphEdges.find(e => _edgeKey(e) === key) || null;
        }

        function _shortId(id) { return id.slice(-4); }

        function openEdgePanel(from, to) {
            const e = graphEdges.find(x =>
                (x.from === from && x.to === to) || (x.from === to && x.to === from)
            );
            if (!e) return;
            selectedEdgeKey = _edgeKey(e);
            edgePanelLabel.textContent = `${_shortId(e.from)} <-> ${_shortId(e.to)}`;
            edgeRenderCheckbox.checked = e.render !== false;
            renderEdgeViewsList(e);
            edgePanel.style.display = '';
            renderGraph();
        }

        function closeEdgePanel() {
            selectedEdgeKey = null;
            edgePanel.style.display = 'none';
            renderGraph();
        }

        function _makeViewRow(view, i) {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex; gap:4px; align-items:center; margin-top:2px;';

            const label = document.createElement('span');
            label.textContent = 'roll';
            label.style.opacity = '0.7';

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.className = 'ev-roll-slider';
            slider.dataset.i = String(i);
            slider.min = '0'; slider.max = '359'; slider.step = '1';
            slider.value = String(Math.round(view.roll_deg));
            slider.style.width = '120px';

            const num = document.createElement('input');
            num.type = 'number';
            num.className = 'ev-roll-num';
            num.dataset.i = String(i);
            num.min = '0'; num.max = '359'; num.step = '1';
            num.value = String(Math.round(view.roll_deg));
            num.style.width = '56px';

            const unit = document.createElement('span');
            unit.textContent = '°';

            const del = document.createElement('button');
            del.type = 'button';
            del.className = 'ev-del';
            del.dataset.i = String(i);
            del.textContent = '×';

            row.appendChild(label);
            row.appendChild(slider);
            row.appendChild(num);
            row.appendChild(unit);
            row.appendChild(del);
            return row;
        }

        function renderEdgeViewsList(edge) {
            edgeViewsContainer.replaceChildren();
            (edge.views || []).forEach((v, i) => {
                edgeViewsContainer.appendChild(_makeViewRow(v, i));
            });
            edgeAddViewBtn.disabled = (edge.views || []).length >= 3;
        }

        edgeRenderCheckbox.addEventListener('change', () => {
            const e = _findEdgeByKey(selectedEdgeKey); if (!e) return;
            e.render = edgeRenderCheckbox.checked;
            renderGraph();
        });

        edgeDeleteBtn.addEventListener('click', () => {
            const e = _findEdgeByKey(selectedEdgeKey); if (!e) return;
            graphEdges = graphEdges.filter(x => x !== e);
            closeEdgePanel();
        });

        edgeAddViewBtn.addEventListener('click', () => {
            const e = _findEdgeByKey(selectedEdgeKey); if (!e) return;
            if ((e.views || []).length >= 3) return;
            // Default roll = 90° (right of travel). If 90° is taken, try 270°, then 0°.
            const used = new Set((e.views || []).map(v => Math.round(v.roll_deg) % 360));
            const candidates = [90, 270, 0, 180, 45, 135, 225, 315];
            const roll = candidates.find(c => !used.has(c)) ?? 90;
            e.views = (e.views || []).concat([{ roll_deg: roll }]);
            renderEdgeViewsList(e);
            renderGraph();
        });

        edgeViewsContainer.addEventListener('input', (ev) => {
            const e = _findEdgeByKey(selectedEdgeKey); if (!e) return;
            const t = ev.target;
            const i = parseInt(t.dataset.i, 10);
            if (Number.isNaN(i) || !e.views[i]) return;
            if (t.classList.contains('ev-roll-slider') || t.classList.contains('ev-roll-num')) {
                let n = parseFloat(t.value);
                if (!Number.isFinite(n)) n = 0;
                n = ((Math.round(n) % 360) + 360) % 360;
                e.views[i].roll_deg = n;
                // Mirror the value into the sibling control.
                const row = t.parentElement;
                if (row) {
                    const other = t.classList.contains('ev-roll-slider')
                        ? row.querySelector('.ev-roll-num')
                        : row.querySelector('.ev-roll-slider');
                    if (other) other.value = String(n);
                }
                renderGraph();
            }
        });

        edgeViewsContainer.addEventListener('click', (ev) => {
            if (!ev.target.classList.contains('ev-del')) return;
            const e = _findEdgeByKey(selectedEdgeKey); if (!e) return;
            const i = parseInt(ev.target.dataset.i, 10);
            e.views.splice(i, 1);
            renderEdgeViewsList(e);
            renderGraph();
        });
        // ── End edge panel ──────────────────────────────────────────────────

        function getFloorPosition(event) {
            getMousePosition(event, orbitContainer);
            raycaster.setFromCamera(mouse, orbitCamera);

            // Try mesh first
            if (collisionMesh) {
                const meshHits = raycaster.intersectObject(collisionMesh, true);
                if (meshHits.length > 0) {
                    return meshHits[0].point;
                }
            }

            // Fallback to invisible floor plane
            const planeHits = raycaster.intersectObject(floorPlane, false);
            if (planeHits.length > 0) {
                return planeHits[0].point;
            }
            return null;
        }

        // ========================================================================
        // GRAPH EDITOR -- EVENT HANDLERS
        // ========================================================================

        orbitContainer.addEventListener('mousemove', (e) => {
            const nodeId = getNodeAtMouse(e);
            if (nodeId !== hoveredNodeId) {
                hoveredNodeId = nodeId;
                updateNodeVisuals();

                // Update tooltip
                const tooltip = document.getElementById('node-tooltip');
                if (nodeId !== null) {
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) {
                        tooltip.textContent = 'Node: ' + nodeId;
                        tooltip.style.display = 'block';
                        tooltip.style.left = (e.clientX - orbitContainer.getBoundingClientRect().left + 15) + 'px';
                        tooltip.style.top = (e.clientY - orbitContainer.getBoundingClientRect().top - 10) + 'px';
                    }
                } else {
                    tooltip.style.display = 'none';
                }
            } else if (hoveredNodeId !== null) {
                // Update tooltip position on move
                const tooltip = document.getElementById('node-tooltip');
                tooltip.style.left = (e.clientX - orbitContainer.getBoundingClientRect().left + 15) + 'px';
                tooltip.style.top = (e.clientY - orbitContainer.getBoundingClientRect().top - 10) + 'px';
            }

            // Update cursor
            orbitRenderer.domElement.style.cursor = nodeId !== null ? 'pointer' : '';
        });

        let mouseDownPos = null;
        let dragStartY = null;        // node Y at drag start (for vertical drag)
        const DRAG_THRESHOLD = 5; // pixels before a click becomes a drag

        // View-cone drag state. Selected edge's view cones become draggable
        // gizmos that rotate around the edge axis to set roll_deg.
        let draggingViewCone = null; // { edgeKey, viewIndex, frame, midpoint }

        orbitContainer.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // left button only
            mouseDownPos = { x: e.clientX, y: e.clientY };

            // View-cone handle takes priority over everything else so the
            // gizmo never gets stolen by node/edge picks behind it.
            if (editMode && !connectMode && selectedEdgeKey && graphViewCones.length > 0) {
                getMousePosition(e, orbitContainer);
                raycaster.setFromCamera(mouse, orbitCamera);
                const hits = raycaster.intersectObjects(graphViewCones, false);
                if (hits.length > 0) {
                    const cone = hits[0].object;
                    const ud = cone.userData;
                    const edge = _findEdgeByKey(_edgeKey({ from: ud.edgeFrom, to: ud.edgeTo }));
                    if (edge) {
                        const canonFrom = edge.from < edge.to ? edge.from : edge.to;
                        const canonTo = edge.from < edge.to ? edge.to : edge.from;
                        const a = graphNodes.find(n => n.id === canonFrom);
                        const b = graphNodes.find(n => n.id === canonTo);
                        if (a && b) {
                            const av = new THREE.Vector3(a.position[0], a.position[1] + NODE_HEIGHT, a.position[2]);
                            const bv = new THREE.Vector3(b.position[0], b.position[1] + NODE_HEIGHT, b.position[2]);
                            const mid = av.clone().add(bv).multiplyScalar(0.5);
                            draggingViewCone = {
                                edgeKey: _edgeKey(edge),
                                viewIndex: ud.viewIndex,
                                frame: _edgeFrame(av, bv),
                                midpoint: mid,
                            };
                            isDragging = true;
                            orbitControls.enabled = false;
                            return;
                        }
                    }
                }
            }

            // Orbit-mode start handle takes precedence over node picking
            // so the handle never gets "lost" behind the tip sphere.
            if (editMode && orbitMode && orbitStartHandleMesh) {
                getMousePosition(e, orbitContainer);
                raycaster.setFromCamera(mouse, orbitCamera);
                const hits = raycaster.intersectObject(orbitStartHandleMesh, false);
                if (hits.length > 0) {
                    draggingStartHandle = true;
                    isDragging = true;
                    orbitControls.enabled = false;
                    return;
                }
            }

            if (editMode && !connectMode) {
                const nodeId = getNodeAtMouse(e);
                if (nodeId !== null) {
                    draggingNodeId = nodeId;
                    isDragging = false; // not yet, need to exceed threshold
                    const node = graphNodes.find(n => n.id === draggingNodeId);
                    dragStartY = node ? node.position[1] : 0;
                }
            }
        });

        orbitContainer.addEventListener('mousemove', (e) => {
            // View-cone rotation: project cursor ray onto the plane through
            // the edge midpoint perpendicular to the edge forward axis, then
            // recover roll_deg from the offset's up_perp / right_perp components.
            if (draggingViewCone) {
                const { frame, midpoint, edgeKey, viewIndex } = draggingViewCone;
                getMousePosition(e, orbitContainer);
                raycaster.setFromCamera(mouse, orbitCamera);
                const ro = raycaster.ray.origin;
                const rd = raycaster.ray.direction;
                // Intersect ray with plane (point = midpoint, normal = forward).
                const denom = rd.dot(frame.forward);
                if (Math.abs(denom) < 1e-6) return;
                const t = midpoint.clone().sub(ro).dot(frame.forward) / denom;
                if (t < 0) return; // plane is behind camera
                const hit = ro.clone().add(rd.clone().multiplyScalar(t));
                const offset = hit.sub(midpoint);
                if (offset.lengthSq() < 1e-8) return;
                const roll = _lookDirToRoll(offset, frame);
                const edge = _findEdgeByKey(edgeKey);
                if (!edge || !edge.views || !edge.views[viewIndex]) return;
                edge.views[viewIndex].roll_deg = Math.round(roll);
                // Update the panel slider/number in place.
                const rows = edgeViewsContainer.children;
                if (rows[viewIndex]) {
                    const slider = rows[viewIndex].querySelector('.ev-roll-slider');
                    const num = rows[viewIndex].querySelector('.ev-roll-num');
                    if (slider) slider.value = String(Math.round(roll));
                    if (num) num.value = String(Math.round(roll));
                }
                renderGraph();
                return;
            }

            // Drag the orbit start handle around the circle. We solve for
            // the cursor's intersection with the horizontal plane at
            // y = tip_y + h, then compute theta from the tip in (x,z).
            if (draggingStartHandle && orbitMode && graphNodes.length > 0) {
                const p = readOrbitParams();
                if (!p) return;
                const tip = orbitTipFor(graphNodes[0]);
                const planeY = tip[1] + p.h;
                getMousePosition(e, orbitContainer);
                raycaster.setFromCamera(mouse, orbitCamera);
                const ro = raycaster.ray.origin;
                const rd = raycaster.ray.direction;
                if (Math.abs(rd.y) < 1e-6) return;  // ray ∥ plane
                const t = (planeY - ro.y) / rd.y;
                if (t < 0) return;                  // plane is behind camera
                const x = ro.x + t * rd.x;
                const z = ro.z + t * rd.z;
                let theta = Math.atan2(z - tip[2], x - tip[0]);   // radians
                let deg = theta * 180 / Math.PI;
                deg = ((deg % 360) + 360) % 360;                  // [0, 360)
                orbitStartThetaDeg = Math.round(deg * 10) / 10;
                updateOrbitPreview();
                return;
            }
            if (draggingNodeId && mouseDownPos) {
                const dx = e.clientX - mouseDownPos.x;
                const dy = e.clientY - mouseDownPos.y;
                if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
                    if (!isDragging) {
                        isDragging = true;
                        orbitControls.enabled = false; // disable orbit while dragging
                    }
                    const node = graphNodes.find(n => n.id === draggingNodeId);
                    if (!node) return;

                    if (e.ctrlKey) {
                        // Vertical drag — lift node along the world up axis
                        // through its ground anchor (X,Z stay fixed). We
                        // project the cursor ray onto that vertical axis
                        // and read the closest point's Y, so the node
                        // tracks the cursor in world space, not screen px.
                        getMousePosition(e, orbitContainer);
                        raycaster.setFromCamera(mouse, orbitCamera);
                        const ax = node.position[0];
                        const az = node.position[2];
                        const ro = raycaster.ray.origin;
                        const rd = raycaster.ray.direction;
                        // Closest-point between axis (ax, *, az), dir (0,1,0)
                        // and the camera ray. Solve for axis parameter t:
                        //   t = (b*e - c*d) / (a*c - b*b)
                        // where a=1 (axisDir·axisDir), c=rd·rd, b=rd.y,
                        // d = -(ro.y - 0), e = rd·(axisOrigin - ro).
                        const b = rd.y;
