                        const c = rd.dot(rd);
                        const wx = ax - ro.x, wy = -ro.y, wz = az - ro.z;
                        const d = wy;                // axisDir·w0
                        const e2 = rd.x * wx + rd.y * wy + rd.z * wz;
                        const denom = c - b * b;     // a=1
                        let newSphereY;
                        if (Math.abs(denom) < 1e-6) {
                            newSphereY = dragStartY + NODE_HEIGHT;
                        } else {
                            newSphereY = (b * e2 - c * d) / denom;
                        }
                        // node.position[1] is the post base; sphere renders
                        // at position[1] + NODE_HEIGHT, so back it out so
                        // the green sphere itself tracks the cursor.
                        const newY = newSphereY - NODE_HEIGHT;
                        node.position = [
                            node.position[0],
                            Math.round(newY * 100) / 100,
                            node.position[2]
                        ];
                        renderGraph();
                    } else {
                        // Horizontal drag — snap to floor under cursor.
                        const floorPos = getFloorPosition(e);
                        if (floorPos) {
                            node.position = [
                                Math.round(floorPos.x * 100) / 100,
                                Math.round(floorPos.y * 100) / 100,
                                Math.round(floorPos.z * 100) / 100
                            ];
                            renderGraph();
                        }
                    }
                }
            }
        });

        orbitContainer.addEventListener('mouseup', (e) => {
            if (e.button !== 0) return;

            if (draggingViewCone) {
                draggingViewCone = null;
                isDragging = false;
                mouseDownPos = null;
                orbitControls.enabled = true;
                return;
            }

            if (draggingStartHandle) {
                draggingStartHandle = false;
                isDragging = false;
                mouseDownPos = null;
                orbitControls.enabled = true;
                return;
            }

            if (isDragging && draggingNodeId) {
                // Finish drag — sync to server
                const node = graphNodes.find(n => n.id === draggingNodeId);
                if (node) {
                    moveNode(draggingNodeId, { x: node.position[0], y: node.position[1], z: node.position[2] });
                }
                orbitControls.enabled = true;
                draggingNodeId = null;
                isDragging = false;
                mouseDownPos = null;
                dragStartY = null;
                return;
            }

            draggingNodeId = null;
            isDragging = false;
            dragStartY = null;
            orbitControls.enabled = true;

            // Treat as click
            const clickedNodeId = getNodeAtMouse(e);

            if (connectMode) {
                if (clickedNodeId !== null) {
                    if (firstSelectedNode === null) {
                        firstSelectedNode = clickedNodeId;
                        selectedNodeId = clickedNodeId;
                        updateNodeVisuals();
                        updateModeIndicator('Connect: click second node to link, or click an edge to delete it');
                    } else if (clickedNodeId !== firstSelectedNode) {
                        // Sticky: stay in connect mode after creating an edge
                        // so the user can chain multiple connections.
                        createEdge(firstSelectedNode, clickedNodeId);
                        firstSelectedNode = null;
                        selectedNodeId = null;
                        updateNodeVisuals();
                        updateModeIndicator('Connect: click first node to link, or click an edge to delete it');
                    }
                } else {
                    // No node hit — try an edge for deletion. Only delete
                    // when no node selection is in progress so a missed
                    // second click doesn't silently nuke an edge.
                    if (firstSelectedNode === null) {
                        const edge = getEdgeAtMouse(e);
                        if (edge) {
                            deleteEdge(edge.from, edge.to);
                            updateModeIndicator('Connect: edge deleted. Click a node to start a new link.');
                        }
                    }
                }
                mouseDownPos = null;
                return;
            }

            if (editMode && !connectMode) {
                const edge = getEdgeAtMouse(e);
                if (edge) {
                    openEdgePanel(edge.from, edge.to);
                    mouseDownPos = null;
                    return;
                }
                if (clickedNodeId !== null) {
                    // Click on node -> select/deselect
                    if (selectedNodeId === clickedNodeId) {
                        selectedNodeId = null;
                    } else {
                        selectedNodeId = clickedNodeId;
                    }
                    updateNodeVisuals();
                } else {
                    // Clicked empty (no node, no edge) - deselect.
                    closeEdgePanel();
                }
                // Single click on empty floor does nothing (double-click to add)
                mouseDownPos = null;
                return;
            }

            // Plan mode: clicks build the waypoint list (allowed pre-Start).
            if (routeMode === 'plan' && clickedNodeId !== null) {
                addPlanWaypoint(clickedNodeId);
            } else if (liveMode && clickedNodeId !== null) {
                // Interactive live: click a node to navigate the robot there.
                setRobotTarget(clickedNodeId);
            }
            mouseDownPos = null;
        });

        orbitContainer.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!editMode) return;
            const nodeId = getNodeAtMouse(e);
            if (nodeId !== null) {
                setStartNode(nodeId);
            }
        });

        // Double-click to add node in edit mode
        orbitContainer.addEventListener('dblclick', (e) => {
            if (!editMode || connectMode) return;
            const floorPos = getFloorPosition(e);
            if (floorPos) {
                addNode(floorPos);
            }
        });

        // Delete/Backspace to remove selected node
        document.addEventListener('keydown', (e) => {
            if (!editMode) return;
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodeId) {
                e.preventDefault();
                const nodeToDelete = selectedNodeId;
                selectedNodeId = null;
                deleteNode(nodeToDelete);
            }
        });

        // ========================================================================
        // GRAPH EDITOR -- OPERATIONS
        // ========================================================================

        async function addNode(position) {
            // In orbit mode the graph is a single tip — re-route an "add"
            // to a move of the existing tip so dblclick repositions it.
            if (orbitMode && graphNodes.length > 0) {
                const tip = graphNodes[0];
                tip.position = [
                    Math.round(position.x * 100) / 100,
                    Math.round(position.y * 100) / 100,
                    Math.round(position.z * 100) / 100,
                ];
                groundYCache.delete(groundKey(tip.position[0], tip.position[2]));
                try {
                    await fetch('/api/graph/node/' + encodeURIComponent(tip.id), {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ position: tip.position }),
                    });
                } catch (e) {
                    console.error('Failed to move orbit tip:', e);
                }
                selectedNodeId = tip.id;
                renderGraph();
                return;
            }
            const id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            const nodeData = {
                id: id,
                position: [
                    Math.round(position.x * 100) / 100,
                    Math.round(position.y * 100) / 100,
                    Math.round(position.z * 100) / 100
                ]
            };

            try {
                const response = await fetch('/api/graph/node', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nodeData)
                });

                if (response.ok) {
                    const result = await response.json();
                    // Use server-returned data if available, otherwise use local
                    const newNode = result.node || nodeData;
                    graphNodes.push(newNode);
                    // In orbit mode, auto-select the freshly placed tip so
                    // the orbit panel pops up without requiring a click.
                    if (orbitMode) selectedNodeId = newNode.id;
                    renderGraph();
                } else {
                    console.error('Failed to add node:', await response.text());
                }
            } catch (e) {
                console.error('Failed to add node:', e);
                // Add locally anyway for responsiveness
                graphNodes.push(nodeData);
                if (orbitMode) selectedNodeId = nodeData.id;
                renderGraph();
            }
        }

        async function deleteEdge(fromId, toId) {
            try {
                const response = await fetch('/api/graph/edge', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: fromId, to: toId })
                });
                if (!response.ok) {
                    console.error('Failed to delete edge:', await response.text());
                    return;
                }
                graphEdges = graphEdges.filter(e =>
                    !((e.from === fromId && e.to === toId) ||
                      (e.from === toId && e.to === fromId))
                );
                renderGraph();
            } catch (err) {
                console.error('deleteEdge error:', err);
            }
        }

        async function createEdge(fromId, toId) {
            // Check if edge already exists
            const exists = graphEdges.some(
                e => (e.from === fromId && e.to === toId) ||
                     (e.from === toId && e.to === fromId)
            );
            if (exists) return;

            const edgeData = { from: fromId, to: toId, render: true, views: [] };

            try {
                const response = await fetch('/api/graph/edge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(edgeData)
                });

                if (response.ok) {
                    graphEdges.push(edgeData);
                    renderGraph();
                } else {
                    console.error('Failed to create edge:', await response.text());
                }
            } catch (e) {
                console.error('Failed to create edge:', e);
                graphEdges.push(edgeData);
                renderGraph();
            }
        }

        async function deleteNode(nodeId) {
            try {
                const response = await fetch('/api/graph/node/' + encodeURIComponent(nodeId), {
                    method: 'DELETE'
                });

                if (response.ok) {
                    graphNodes = graphNodes.filter(n => n.id !== nodeId);
                    graphEdges = graphEdges.filter(e => e.from !== nodeId && e.to !== nodeId);

                    if (selectedNodeId === nodeId) selectedNodeId = null;
                    if (hoveredNodeId === nodeId) hoveredNodeId = null;

                    renderGraph();
                } else {
                    console.error('Failed to delete node:', await response.text());
                }
            } catch (e) {
                console.error('Failed to delete node:', e);
                graphNodes = graphNodes.filter(n => n.id !== nodeId);
                graphEdges = graphEdges.filter(e => e.from !== nodeId && e.to !== nodeId);
                if (selectedNodeId === nodeId) selectedNodeId = null;
                if (hoveredNodeId === nodeId) hoveredNodeId = null;
                renderGraph();
            }
        }

        async function clearGraph() {
            try {
                const response = await fetch('/api/graph', { method: 'DELETE' });
                if (response.ok) {
                    graphNodes = [];
                    graphEdges = [];
                    selectedNodeId = null;
                    hoveredNodeId = null;
                    startNodeId = null;
                    renderGraph();
                }
            } catch (e) {
                console.error('Failed to clear graph:', e);
            }
        }

        async function moveNode(nodeId, newPosition) {
            const pos = [
                Math.round(newPosition.x * 100) / 100,
                Math.round(newPosition.y * 100) / 100,
                Math.round(newPosition.z * 100) / 100
            ];
            try {
                const response = await fetch('/api/graph/node/' + encodeURIComponent(nodeId), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ position: pos })
                });
                if (response.ok) {
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) node.position = pos;
                    renderGraph();
                }
            } catch (e) {
                console.error('Failed to move node:', e);
            }
        }

        async function setStartNode(nodeId) {
            try {
                const response = await fetch('/api/graph/start_node', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_id: nodeId })
                });
                if (response.ok) {
                    startNodeId = nodeId;
                    // Snap robot to start node
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) {
                        robotPosition.set(node.position[0], node.position[1], node.position[2]);
                        robotMoving = false;
                        clearPathHighlight();
                        currentTargetNodeId = null;
                        document.getElementById('target-name').textContent = 'None';
                        updateRobotMarker();
                        updateRobotCamera();
                    }
                    updateNodeVisuals();
                }
            } catch (e) {
                console.error('Failed to set start node:', e);
            }
        }

        // Queued target: requested while robot is mid-segment
        let pendingTarget = null;

        function setRobotTarget(nodeId) {
            if (!liveMode) return;

            if (robotMoving && robotPath.length > 0 && robotPathTargetIdx < robotPath.length) {
                // Robot is mid-segment — queue the target and let it finish
                // the current edge first
                pendingTarget = nodeId;
                currentTargetNodeId = nodeId;
                document.getElementById('target-name').textContent = nodeId;
                updateNodeVisuals();
                return;
            }

            // Robot is idle at a node — request path immediately
            pendingTarget = null;
            currentTargetNodeId = nodeId;
            document.getElementById('target-name').textContent = nodeId;
            updateNodeVisuals();

            socket.emit('robot_command', {
                target: nodeId,
                from_node: robotCurrentNode
            });
        }

        // ========================================================================
        // PLAN MODE
        // ========================================================================

        function renderPlanWaypoints() {
            const container = document.getElementById('plan-waypoints');
            while (container.firstChild) container.removeChild(container.firstChild);
            for (let i = 0; i < planWaypoints.length; i++) {
                const chip = document.createElement('span');
                chip.className = 'wp-chip';
                chip.title = 'Click to remove';
                const idx = document.createElement('span');
                idx.className = 'wp-idx';
                idx.textContent = String(i + 1);
                chip.appendChild(idx);
                chip.appendChild(document.createTextNode(planWaypoints[i]));
                const here = i;
                chip.addEventListener('click', () => {
                    if (planActive) return;
                    planWaypoints.splice(here, 1);
                    refreshPlanUI();
                });
                container.appendChild(chip);
            }
            const clearBtn = document.getElementById('btn-plan-clear');
            clearBtn.disabled = planActive || planWaypoints.length === 0;
        }

        function refreshPlanUI() {
            renderPlanWaypoints();
            updateNodeVisuals();
            const renderBtn = document.getElementById('btn-plan-render');
            if (renderBtn) renderBtn.disabled = planActive || planWaypoints.length < 1;
            const editingDisabled = planActive;
            edgePanel.querySelectorAll('input, button, select').forEach(el => { el.disabled = editingDisabled; });
            const saveBtn = document.getElementById('btn-save-graph');
            if (saveBtn) saveBtn.disabled = editingDisabled;
        }

        // ── Arc-length sampling along a polyline ───────────────────────────
        function arcLengthSample(positions, spacing) {
            if (positions.length < 2) return [];
            // Compute cumulative arc length
            const cum = [0];
            for (let i = 1; i < positions.length; i++) {
                const dx = positions[i].x - positions[i-1].x;
                const dy = positions[i].y - positions[i-1].y;
                const dz = positions[i].z - positions[i-1].z;
                cum.push(cum[i-1] + Math.sqrt(dx*dx + dy*dy + dz*dz));
            }
            const total = cum[cum.length - 1];
            if (total < 1e-6) return [];

            const samples = [];
            let seg = 0;
            const nSteps = Math.max(1, Math.floor(total / spacing));
            for (let k = 0; k <= nSteps; k++) {
                const s = Math.min(k * spacing, total);
                while (seg < cum.length - 2 && cum[seg+1] < s) seg++;
                const segLen = cum[seg+1] - cum[seg];
                const t = segLen > 1e-9 ? (s - cum[seg]) / segLen : 0;
                const a = positions[seg], b = positions[seg+1];
                const pos = {
                    x: a.x + (b.x - a.x) * t,
                    y: a.y + (b.y - a.y) * t,
                    z: a.z + (b.z - a.z) * t,
                };
                const dx = b.x - a.x, dz = b.z - a.z;
                const yaw = Math.atan2(-dx, -dz);
                samples.push({ pos, yaw, arcLen: s, seg });
            }
            return samples;
        }

        // Potree's HQSplatRenderer pre-allocates fixed-size GPU buffers at
        // boot; pushing pointBudget beyond ~12M crashes it ("offset is out
        // of bounds" inside renderOctree). The real quality dial for static
        // captures is therefore stableFrames + maxMs — letting the LOD
        // stream finish at a moderate budget — rather than raising the cap.
        const QUALITY_PRESETS = {
            standard: { pointBudget: 3_000_000,  minSize: 2, maxMs: 3000,  stableFrames: 5 },
            high:     { pointBudget: 8_000_000,  minSize: 2, maxMs: 10000, stableFrames: 10 },
            ultra:    { pointBudget: 12_000_000, minSize: 1, maxMs: 25000, stableFrames: 20 },
        };

        async function renderPlanFrames() {
            if (planActive) return;
            const name = (document.getElementById('render-name').value || '').trim();
            const spacing = parseFloat(document.getElementById('render-spacing').value);
            const quality = document.getElementById('render-quality').value;
            const progress = document.getElementById('render-progress');

            if (!name) { alert('Pick a render name'); return; }
            if (!(spacing > 0)) { alert('Spacing must be > 0'); return; }
            if (planWaypoints.length < 1) { alert('Add waypoints first'); return; }
            if (!potreeReady) { alert('Potree not ready yet'); return; }

            // Build the chained path from server (always include current robot
            // node as the leg origin so the route starts where the robot is).
            const wpFull = [robotCurrentNode, ...planWaypoints].filter(Boolean);
            const wp = [];
            for (const n of wpFull) if (wp.length === 0 || wp[wp.length-1] !== n) wp.push(n);
            if (wp.length < 2) { alert('Plan needs ≥1 waypoint distinct from current node'); return; }

            const resp = await fetch('/api/plan/path', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ waypoints: wp }),
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                alert('Path failed: ' + (err.error || resp.status));
                return;
            }
            const { path } = await resp.json();
            const positions = path.map(n => ({ x: n.position[0], y: n.position[1], z: n.position[2] }));
            const pathIds = path.map(n => n.id);
            const samples = arcLengthSample(positions, spacing);
            if (samples.length === 0) { alert('Path too short'); return; }

            // Boost Potree quality, remember previous so we can restore.
            const preset = QUALITY_PRESETS[quality] || QUALITY_PRESETS.high;
            postToPotree({ type: 'quality', pointBudget: preset.pointBudget, minSize: preset.minSize });
            // Brief settle after quality bump.
            await new Promise(r => setTimeout(r, 500));

            // Per-run directory: <name>__<quality>__<YYYYMMDD-HHMMSS>
            const ts = (() => {
                const d = new Date();
                const p = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-` +
                       `${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
            })();
            const runName = `${name}__${quality}__${ts}`;

            planActive = true;
            robotMoving = false;
            refreshPlanUI();
            const t0 = performance.now();
            try {
                const edgeMetaByKey = new Map();
                for (const e of graphEdges) {
                    edgeMetaByKey.set(_edgeKey(e), {
                        render: e.render !== false,
                        views: (e.views || []).slice(),
                        canonical: e.from < e.to ? [e.from, e.to] : [e.to, e.from],
                    });
                }

                for (let i = 0; i < samples.length; i++) {
                    const s = samples[i];
                    const a = pathIds[s.seg];
                    const b = pathIds[s.seg + 1];
                    const metaKey = a < b ? `${a}|${b}` : `${b}|${a}`;
                    const meta = edgeMetaByKey.get(metaKey)
                              || { render: true, views: [], canonical: [a, b] };

                    if (!meta.render) {
                        progress.textContent = `sample ${i+1}/${samples.length}: skipped (edge ${a.slice(-4)}<->${b.slice(-4)})`;
                        continue;
                    }

                    // Build the canonical edge frame so the captured look direction
                    // is a world-space property of the edge — independent of which
                    // way the robot happens to be walking. roll_deg is stored in
                    // canonical orientation; the frame here uses canonical forward.
                    const canonFrom = graphNodes.find(n => n.id === meta.canonical[0]);
                    const canonTo = graphNodes.find(n => n.id === meta.canonical[1]);
                    const _canonFromVec = canonFrom ? new THREE.Vector3(canonFrom.position[0], canonFrom.position[1] + NODE_HEIGHT, canonFrom.position[2]) : new THREE.Vector3();
                    const _canonToVec = canonTo ? new THREE.Vector3(canonTo.position[0], canonTo.position[1] + NODE_HEIGHT, canonTo.position[2]) : new THREE.Vector3(1, 0, 0);
                    const _frame = _edgeFrame(_canonFromVec, _canonToVec);

                    async function captureAndPost({ yaw, pitch, viewCode, rollOpt }) {
                        robotPosition.set(s.pos.x, s.pos.y, s.pos.z);
                        robotYaw = yaw;
                        robotPitch = pitch;
                        updateRobotMarker();
                        updateRobotCamera();
                        await new Promise(r => setTimeout(r, 80));

                        const cap = await captureFromPotree({
                            maxMs: preset.maxMs,
                            stableFrames: preset.stableFrames,
                            parentTimeoutMs: preset.maxMs + 8000,
                        });
                        // Eye is +1m above the robot (see sendPotreePose);
                        // target derives from yaw + pitch.
                        const eyeX = s.pos.x, eyeY = s.pos.y + 1.0, eyeZ = s.pos.z;
                        const cy = Math.cos(pitch), sy = Math.sin(pitch);
                        const fx = -Math.sin(yaw) * cy;
                        const fy = sy;
                        const fz = -Math.cos(yaw) * cy;
                        const pose = {
                            position: [eyeX, eyeY, eyeZ],
                            target: [eyeX + fx, eyeY + fy, eyeZ + fz],
                            yaw, pitch,
                            arc_length: s.arcLen,
                            quality,
                            intrinsics: cap.intrinsics || null,
                        };
                        if (rollOpt !== undefined && rollOpt !== null) {
                            pose.roll_deg = rollOpt;
                        }
                        const r = await fetch('/api/render_frame', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ name: runName, index: i, view: viewCode, png_b64: cap.dataUrl, pose }),
                        });
                        if (!r.ok) {
                            const err = await r.json().catch(() => ({}));
                            throw new Error(err.error || r.status);
                        }
                        return cap.stats;
                    }

                    let captureStats = null;
                    try {
                        captureStats = await captureAndPost({ yaw: s.yaw, pitch: 0, viewCode: 'forward' });
                    } catch (e) {
                        console.error('forward capture failed at sample', i, e);
                        progress.textContent = `frame ${i+1}: capture failed (${e.message})`;
                        continue;
                    }

                    function _viewCodeRoll(rollDeg) {
                        return `R${String(Math.round(rollDeg)).padStart(3, '0')}`;
                    }
                    for (const v of meta.views) {
                        const roll = ((Math.round(v.roll_deg) % 360) + 360) % 360;
                        const look = _rollToLookDir(roll, _frame);
                        // Convert lookDir → (yaw, pitch) for the existing camera pipeline.
                        // Forward convention: f = (-sin(yaw)cos(pitch), sin(pitch), -cos(yaw)cos(pitch)).
                        const pitchRad = Math.asin(Math.max(-1, Math.min(1, look.y)));
                        const yawRad = Math.atan2(-look.x, -look.z);
                        const code = _viewCodeRoll(roll);
                        try {
                            await captureAndPost({
                                yaw: yawRad,
                                pitch: pitchRad,
                                viewCode: code,
                                rollOpt: roll,
                            });
                        } catch (e) {
                            console.error('view capture failed at sample', i, code, e);
                            // Continue — partial capture is preferable to halting the run.
                        }
                    }

                    robotPitch = 0;

                    const t = captureStats
                        ? `${captureStats.elapsedMs}ms ${(captureStats.lru/1e6).toFixed(1)}M pts`
                        : '';
                    progress.textContent = `frame ${i+1}/${samples.length}  s=${s.arcLen.toFixed(1)}m  +${mirroredViews.length} views  ${t}`;
                }
                const dt = ((performance.now() - t0) / 1000).toFixed(1);
                progress.textContent = `done: ${samples.length} frames in ${dt}s → renders/${runName}/`;
            } finally {
                planActive = false;
                refreshPlanUI();
                // Restore default quality (matches potree-view.html boot).
                postToPotree({ type: 'quality', pointBudget: 8_000_000, minSize: 2 });
                // The render started from `robotCurrentNode` and walked the
                // chain; restore the marker to that origin so the live view
                // doesn't appear to have teleported.
                const origin = graphNodes.find(n => n.id === robotCurrentNode);
                if (origin) {
                    robotPosition.set(origin.position[0], origin.position[1], origin.position[2]);
                    robotYaw = 0;
                    updateRobotMarker();
                    updateRobotCamera();
                }
            }
        }

        // ── Orbit render ────────────────────────────────────────────────
        // An "orbit" is a circular flight path around a tip point: at angle
        // θ the camera sits at tip + (r·cosθ, h, r·sinθ) and looks at the
        // tip, with r = d·cos(elev) and h = d·sin(elev). Positive elev
        // puts the camera above the tip (cone opens downward); negative
        // puts it below (cone opens upward).

        const orbitPreviewGroup = new THREE.Group();
        orbitScene.add(orbitPreviewGroup);
        let orbitActive = false;
        let orbitStartThetaDeg = 0;       // angle of the render start point on the circle
        let draggingStartHandle = false;  // mouse-drag state for the start marker
        let orbitStartHandleMesh = null;  // currently rendered start-handle sphere

        // Materials/geometries reused across preview rebuilds.
        const orbitStartHandleGeometry = new THREE.SphereGeometry(0.18, 16, 12);
        const orbitStartHandleMaterial = new THREE.MeshBasicMaterial({ color: 0xff8c00 });

        function readOrbitParams() {
            const r = parseFloat(document.getElementById('orbit-radius').value);
            const h = parseFloat(document.getElementById('orbit-height').value);
            const n = parseInt(document.getElementById('orbit-samples').value, 10);
            if (!(r > 0) || !Number.isFinite(h) || !(n >= 3)) return null;
            const d = Math.hypot(r, h);
            const elevDeg = Math.atan2(h, r) * 180 / Math.PI;
            return { d, elevDeg, n, r, h };
        }

        function orbitTipFor(node) {
            // Tip = the node sphere itself (post-base + NODE_HEIGHT lift).
            return [node.position[0], node.position[1] + NODE_HEIGHT, node.position[2]];
        }

        function orbitCameraAt(tip, p, theta) {
            return [
                tip[0] + p.r * Math.cos(theta),
                tip[1] + p.h,
                tip[2] + p.r * Math.sin(theta),
            ];
        }

        function updateOrbitPreview() {
            if (!document.getElementById('orbit-controls')) return;
            // Tear down old preview; dispose only geometries we created
            // here (materials are shared singletons, must not dispose).
            while (orbitPreviewGroup.children.length) {
                const c = orbitPreviewGroup.children[0];
                orbitPreviewGroup.remove(c);
                if (c.geometry && c !== orbitStartHandleMesh) c.geometry.dispose();
            }
            orbitStartHandleMesh = null;

            const panel = document.getElementById('orbit-controls');
            const renderStrip = document.getElementById('orbit-render-controls');
            const renderBtn = document.getElementById('btn-orbit-render');

            // Tip node = first node when in orbit mode (the only one).
            const tipNode = orbitMode ? graphNodes[0] : null;
            // Edit panel: only when actively editing the orbit definition.
            // Render strip: any time an orbit is loaded, including outside
            // edit mode, so playback works from interactive/plan flows.
            const showEditPanel = !!(editMode && orbitMode && tipNode);
            const showRenderStrip = !!(orbitMode && tipNode);
            panel.hidden = !showEditPanel;
            renderStrip.hidden = !showRenderStrip;
            renderBtn.disabled = !(showRenderStrip && potreeReady && !orbitActive);
            if (!orbitMode || !tipNode) return;

            const p = readOrbitParams();
            if (!p) return;

            const tip = orbitTipFor(tipNode);
            // Flight-path circle.
            const segs = 96;
            const pts = [];
            for (let i = 0; i <= segs; i++) {
                const t = (i / segs) * Math.PI * 2;
                const c = orbitCameraAt(tip, p, t);
                pts.push(new THREE.Vector3(c[0], c[1], c[2]));
            }
            orbitPreviewGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0x00d4d4 })
            ));
            // Axis: tip → orbit-circle center.
            const axisLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(tip[0], tip[1], tip[2]),
                    new THREE.Vector3(tip[0], tip[1] + p.h, tip[2]),
                ]),
                new THREE.LineDashedMaterial({ color: 0x008888, dashSize: 0.2, gapSize: 0.15 })
            );
            axisLine.computeLineDistances();
            orbitPreviewGroup.add(axisLine);
            // Start-point hint: tip → start camera position.
            const theta0 = orbitStartThetaDeg * Math.PI / 180;
            const camStart = orbitCameraAt(tip, p, theta0);
            orbitPreviewGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(tip[0], tip[1], tip[2]),
                    new THREE.Vector3(camStart[0], camStart[1], camStart[2]),
                ]),
                new THREE.LineBasicMaterial({ color: 0xff8c00 })
            ));
            // Draggable start handle (orange sphere on the circle).
            const handle = new THREE.Mesh(orbitStartHandleGeometry, orbitStartHandleMaterial);
            handle.position.set(camStart[0], camStart[1], camStart[2]);
            handle.userData.orbitStartHandle = true;
            orbitPreviewGroup.add(handle);
            orbitStartHandleMesh = handle;
        }

        function sendOrbitPose(camPos, tipPos) {
            // Bypass robot's +1 offset by posting position+target directly.
            const r = ORIENTATION_PRESETS[orientationIndex].rot;
            postToPotree({
                type: 'pose',
                position: camPos,
                target: tipPos,
                fov: 60, near: 0.1, far: 500,
                orientationEuler: r,
            });
        }

        async function renderOrbitFrames() {
            if (orbitActive) return;
            const node = orbitMode ? graphNodes[0] : graphNodes.find(n => n.id === selectedNodeId);
            if (!node) { alert('No tip node — place one first'); return; }
            const p = readOrbitParams();
            if (!p) { alert('Bad orbit params'); return; }
            if (!potreeReady) { alert('Potree not ready'); return; }
            const name = (document.getElementById('orbit-name').value || '').trim();
            if (!name) { alert('Pick an orbit name'); return; }
            const quality = document.getElementById('orbit-quality').value;
            const progress = document.getElementById('orbit-progress');

            const preset = QUALITY_PRESETS[quality] || QUALITY_PRESETS.high;
            // Optional UI override of the preset's stable-frames count.
            // Blank/invalid input falls back to the preset default.
            const stableOverride = parseInt(
                document.getElementById('orbit-stable').value, 10
            );
            const stableFrames = (stableOverride > 0)
                ? stableOverride : preset.stableFrames;
            postToPotree({ type: 'quality', pointBudget: preset.pointBudget, minSize: preset.minSize });
            await new Promise(r => setTimeout(r, 500));

            const tip = orbitTipFor(node);
            const ts = (() => {
                const d = new Date(); const z = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}${z(d.getMonth()+1)}${z(d.getDate())}-${z(d.getHours())}${z(d.getMinutes())}${z(d.getSeconds())}`;
            })();
            const runName = `${name}__orbit__${quality}__${ts}`;

            orbitActive = true;
            updateOrbitPreview();
            const t0 = performance.now();
            try {
                const theta0 = orbitStartThetaDeg * Math.PI / 180;
                for (let i = 0; i < p.n; i++) {
                    const theta = theta0 + (i / p.n) * Math.PI * 2;
                    const cam = orbitCameraAt(tip, p, theta);
                    sendOrbitPose(cam, tip);
                    await new Promise(r => setTimeout(r, 80));

                    let dataUrl, captureStats = null, capIntrinsics = null;
                    try {
                        const cap = await captureFromPotree({
                            maxMs: preset.maxMs,
                            stableFrames,
                            parentTimeoutMs: preset.maxMs + 8000,
                        });
                        dataUrl = cap.dataUrl;
                        captureStats = cap.stats || null;
                        capIntrinsics = cap.intrinsics || null;
                    } catch (e) {
                        console.error('orbit capture failed at sample', i, e);
                        progress.textContent = `frame ${i+1}: capture failed (${e.message})`;
                        continue;
                    }

                    const pose = {
                        position: cam,
                        target: tip,
                        theta_deg: ((theta * 180 / Math.PI) % 360 + 360) % 360,
                        start_theta_deg: orbitStartThetaDeg,
                        radius_m: p.r,
                        height_m: p.h,
                        node_id: node.id,
                        quality,
                        intrinsics: capIntrinsics,
                    };
                    const r = await fetch('/api/render_frame', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ name: runName, index: i, png_b64: dataUrl, pose }),
                    });
                    if (!r.ok) {
                        const err = await r.json().catch(() => ({}));
                        progress.textContent = `frame ${i+1}: save failed (${err.error || r.status})`;
                        break;
                    }
                    const t = captureStats
                        ? `${captureStats.elapsedMs}ms ${(captureStats.lru/1e6).toFixed(1)}M pts`
                        : '';
                    progress.textContent = `frame ${i+1}/${p.n}  θ=${(theta*180/Math.PI).toFixed(0)}°  ${t}`;
                }
                const dt = ((performance.now() - t0) / 1000).toFixed(1);
                progress.textContent = `done: ${p.n} frames in ${dt}s → renders/${runName}/`;
            } finally {
                orbitActive = false;
                updateOrbitPreview();
                postToPotree({ type: 'quality', pointBudget: 8_000_000, minSize: 2 });
                // Restore the live robot pose so the iframe doesn't stay
                // stuck at the last orbit sample.
                if (typeof updateRobotCamera === 'function') updateRobotCamera();
            }
        }

        // Refresh preview when inputs change.
        ['orbit-radius', 'orbit-height', 'orbit-samples'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateOrbitPreview);
        });
        document.getElementById('btn-orbit-render').addEventListener('click', renderOrbitFrames);

        function addPlanWaypoint(nodeId) {
            if (planActive) return;
            if (planWaypoints.length > 0 && planWaypoints[planWaypoints.length - 1] === nodeId) {
                return;
            }
            planWaypoints.push(nodeId);
            refreshPlanUI();
        }

        function clearPlan() {
            if (planActive) return;
            planWaypoints = [];
            refreshPlanUI();
        }

        function startPlan() {
            if (planActive || planWaypoints.length < 1) return;
            const seq = [robotCurrentNode, ...planWaypoints].filter(n => n);
            const waypoints = [];
            for (const n of seq) {
                if (waypoints.length === 0 || waypoints[waypoints.length - 1] !== n) {
                    waypoints.push(n);
                }
            }
            if (waypoints.length < 2) {
                console.warn('Plan needs at least one waypoint different from current node');
                return;
            }
            planActive = true;
            currentTargetNodeId = planWaypoints[planWaypoints.length - 1];
            document.getElementById('target-name').textContent = currentTargetNodeId;
            updateNodeVisuals();
            socket.emit('plan_command', { waypoints });
            renderPlanWaypoints();
        }

        async function runHeadlessPlan() {
            // Wait for graph to be populated
            const deadline = performance.now() + 30000;
            while (graphNodes.length === 0 && performance.now() < deadline) {
                await new Promise(r => setTimeout(r, 100));
            }
            if (graphNodes.length === 0) {
                console.error('[headless] no graph loaded');
                return;
            }
            // Validate plan node IDs
            const known = new Set(graphNodes.map(n => n.id));
            const missing = HEADLESS_PLAN.filter(id => !known.has(id));
            if (missing.length) {
                console.error('[headless] unknown nodes in plan:', missing);
                return;
            }

            robotSpeed = HEADLESS_SPEED;
            document.getElementById('speed-slider').value = String(HEADLESS_SPEED);
            document.getElementById('speed-value').textContent = HEADLESS_SPEED.toFixed(1);

            // Set plan mode and load waypoints BEFORE pressing Start so the
            // Start handler auto-fires startPlan().
            setRouteMode('plan');
            planWaypoints = HEADLESS_PLAN.slice();
            refreshPlanUI();

            // Wait for Potree to be loaded if requested
            if (HEADLESS_VIEW === 'potree') {
                const potDeadline = performance.now() + 60000;
                while (!potreeReady && performance.now() < potDeadline) {
                    await new Promise(r => setTimeout(r, 200));
                }
                await new Promise(r => setTimeout(r, 1500));
            }

            window.__headlessReady = true;
            // Start enters live mode and (because plan has waypoints) drives it.
            document.getElementById('btn-start-stop').click();
        }

        // ========================================================================
        // GRAPH API
        // ========================================================================

        async function fetchGraph() {
            try {
                const response = await fetch('/api/graph');
                if (response.ok) {
                    const data = await response.json();
                    graphNodes = data.nodes || [];
                    graphEdges = (data.edges || []).map(e => ({
                        from: e.from,
                        to: e.to,
                        render: e.render !== false,
                        views: Array.isArray(e.views) ? e.views.slice() : [],
                    }));
                    startNodeId = data.start_node || null;
                    applyOrbitFromServer(data.orbit);
                    renderGraph();

                    // Snap robot to start node (or first node)
                    const spawnNode = startNodeId
                        ? graphNodes.find(n => n.id === startNodeId)
                        : graphNodes[0];
                    if (spawnNode) {
                        robotPosition.set(
                            spawnNode.position[0],
                            spawnNode.position[1],
                            spawnNode.position[2]
                        );
                        robotCurrentNode = spawnNode.id;
                        updateRobotMarker();
                        updateRobotCamera();
                    }
                }
            } catch (e) {
                console.error('Failed to fetch graph:', e);
            }
        }

        async function fetchGraphList() {
            try {
                const response = await fetch('/api/graphs');
                if (response.ok) {
                    const data = await response.json();
                    const select = document.getElementById('graph-select');
                    // Clear existing options except first
                    while (select.options.length > 1) {
                        select.remove(1);
                    }
                    const names = data.graphs || data || [];
                    for (const name of names) {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    }
                }
            } catch (e) {
                console.error('Failed to fetch graph list:', e);
            }
        }

        function applyOrbitFromServer(orbit) {
            // Mirror server-side orbit state into the UI. Called on every
            // graph fetch so loading a saved orbit graph restores the
            // panel inputs, sub-mode, and start angle.
            if (orbit && typeof orbit === 'object') {
                orbitMode = true;
                document.getElementById('orbit-radius').value = orbit.radius;
                document.getElementById('orbit-height').value = orbit.height;
                document.getElementById('orbit-samples').value = orbit.samples;
                orbitStartThetaDeg = Number(orbit.start_theta_deg) || 0;
                if (orbit.tip_node_id) selectedNodeId = orbit.tip_node_id;
            } else {
                orbitMode = false;
                orbitStartThetaDeg = 0;
            }
            applyEditSubmodeUI();
            updateModeIndicator(editMode ? editModeIndicator() : 'Navigate: orbit view');
        }

        function buildOrbitPayload() {
            // Returns the orbit definition to persist with the current graph,
            // or null if there's nothing meaningful to save (waypoint mode,
            // or orbit mode with no tip yet).
            if (!orbitMode || graphNodes.length === 0) return null;
            const p = readOrbitParams();
            if (!p) return null;
            return {
                tip_node_id: graphNodes[0].id,
                radius: p.r,
                height: p.h,
                samples: p.n,
                start_theta_deg: orbitStartThetaDeg,
            };
        }

        function serializeEdges() {
            return graphEdges.map(e => {
                const out = { from: e.from, to: e.to };
                if (e.render === false) out.render = false;
                if (e.views && e.views.length > 0) {
                    out.views = e.views.map(v => ({ roll_deg: v.roll_deg }));
                }
                return out;
            });
        }

        async function saveGraph() {
            const name = prompt('Graph name:', 'default');
            if (!name) return;

            try {
                // Push current frontend graph state (including edge metadata) to the
                // server so the next save reflects render/views edits made via the UI.
                const graphPayload = {
                    nodes: graphNodes.map(n => ({ id: n.id, position: n.position })),
                    edges: serializeEdges(),
                };
                if (startNodeId) graphPayload.start_node = startNodeId;

                const putResp = await fetch('/api/graph', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(graphPayload),
                });
                if (!putResp.ok) {
                    console.error('Failed to sync graph before save:', await putResp.text());
                    return;
                }

                const response = await fetch('/api/graph/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, orbit: buildOrbitPayload() })
                });

                if (response.ok) {
                    fetchGraphList();
                } else {
                    console.error('Failed to save graph:', await response.text());
                }
            } catch (e) {
                console.error('Failed to save graph:', e);
            }
        }

        async function loadGraph(name) {
            if (!name) return;

            try {
                const response = await fetch('/api/graph/load/' + encodeURIComponent(name), {
                    method: 'POST'
                });

                if (response.ok) {
                    // Server loaded the graph, now fetch the updated data
                    await fetchGraph();
                } else {
                    console.error('Failed to load graph:', await response.text());
                }
            } catch (e) {
                console.error('Failed to load graph:', e);
            }
        }

        // ========================================================================
        // UI EVENT HANDLERS
        // ========================================================================

        // Edit mode toggle
        const btnEditMode = document.getElementById('btn-edit-mode');
        const editOnlyControls = document.getElementById('edit-only-controls');
        btnEditMode.addEventListener('click', () => {
            if (liveMode) return;  // can't edit while live
            editMode = !editMode;
            btnEditMode.classList.toggle('active', editMode);
            editOnlyControls.hidden = !editMode;

            // Hide robot during editing, show when navigating
            robotGroup.visible = !editMode;

            if (!editMode) {
                connectMode = false;
                firstSelectedNode = null;
                selectedNodeId = null;
                document.getElementById('btn-add-edge').classList.remove('active');
                updateNodeVisuals();
                closeEdgePanel();
            }

            applyEditSubmodeUI();
            updateModeIndicator(editMode ? editModeIndicator() : 'Navigate: orbit view');
        });

        // ── Edit sub-mode: Waypoints vs Orbit ──────────────────────────
        const btnModeWaypoints = document.getElementById('btn-mode-waypoints');
        const btnModeOrbit = document.getElementById('btn-mode-orbit');

        function editModeIndicator() {
            return orbitMode
                ? 'Orbit edit: dbl-click sets/moves the tip, Ctrl+drag lifts it'
                : 'Edit: dbl-click add, drag move, Ctrl+drag lift, Del remove, right-click set start';
        }

        function applyEditSubmodeUI() {
            btnModeWaypoints.classList.toggle('active', !orbitMode);
            btnModeOrbit.classList.toggle('active', orbitMode);
            // Hide waypoint-only actions in orbit mode (1 node, 0 edges).
            const wpOnly = ['btn-add-edge', 'btn-set-start'];
            for (const id of wpOnly) {
                document.getElementById(id).style.display = orbitMode ? 'none' : '';
            }
            // Bottom controls bar: Start, the Interactive|Plan toggle, and
            // the plan render strip have no meaning in orbit mode (no
            // waypoints to navigate). Hide them so the orbit render strip
            // is the only render UI on screen.
            const wpBottom = ['btn-start-stop', 'route-mode-group', 'plan-controls'];
            for (const id of wpBottom) {
                const el = document.getElementById(id);
                if (!el) continue;
                if (orbitMode) {
                    el.style.display = 'none';
                } else {
                    el.style.display = '';
                    // plan-controls also needs its own hidden flag honored.
                    if (id === 'plan-controls' && typeof routeMode !== 'undefined') {
                        el.hidden = (routeMode !== 'plan');
                    }
                }
            }
        }

        async function enterOrbitMode() {
            if (orbitMode) return;
            // Orbit mode keeps a single tip + zero edges. If the current
            // graph has more than that, ask before destroying nodes/edges.
            const extraNodes = Math.max(0, graphNodes.length - 1);
            const extraEdges = graphEdges.length;
            if (extraNodes > 0 || extraEdges > 0) {
                const ok = confirm(
                    `Orbit mode allows only 1 node and 0 edges.\n` +
                    `Drop ${extraNodes} node(s) and ${extraEdges} edge(s)?`
                );
                if (!ok) return;
                // Delete everything but the first node. The server's
                // remove_node also drops its incident edges, so we
                // delete extra nodes first, then any remaining edges.
                const keep = graphNodes[0];
                const drops = graphNodes.slice(1);
                for (const n of drops) {
                    try {
                        await fetch('/api/graph/node/' + encodeURIComponent(n.id), { method: 'DELETE' });
                    } catch (e) { console.error('drop node failed:', e); }
                }
                graphNodes = keep ? [keep] : [];
                // Drop any edges that survived (e.g. between the kept node
                // and itself, or that the server didn't auto-remove).
                for (const ed of graphEdges) {
                    try {
                        await fetch('/api/graph/edge', {
                            method: 'DELETE',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ from: ed.from, to: ed.to }),
                        });
                    } catch (e) { console.error('drop edge failed:', e); }
                }
                graphEdges = [];
            }
            orbitMode = true;
            // Cancel any in-flight connect-mode pickers.
            connectMode = false;
            firstSelectedNode = null;
            document.getElementById('btn-add-edge').classList.remove('active');
            // Auto-select the single tip so the orbit panel shows.
            selectedNodeId = graphNodes[0]?.id || null;
            applyEditSubmodeUI();
            updateModeIndicator(editModeIndicator());
            renderGraph();
        }

        function exitOrbitMode() {
            if (!orbitMode) return;
            orbitMode = false;
            applyEditSubmodeUI();
            updateModeIndicator(editModeIndicator());
            // updateOrbitPreview hides the panel because orbitMode-aware
            // logic in renderGraph isn't required, but selection may stay.
            renderGraph();
        }

        btnModeWaypoints.addEventListener('click', () => {
            if (!editMode) return;
            exitOrbitMode();
        });
        btnModeOrbit.addEventListener('click', () => {
            if (!editMode) return;
            enterOrbitMode();
        });

        // Connect mode
        const btnAddEdge = document.getElementById('btn-add-edge');
        btnAddEdge.addEventListener('click', () => {
            if (!editMode) {
                editMode = true;
                btnEditMode.classList.add('active');
                editOnlyControls.hidden = false;
            }

            connectMode = !connectMode;
            btnAddEdge.classList.toggle('active', connectMode);
            firstSelectedNode = null;
            selectedNodeId = null;
            updateNodeVisuals();

            updateModeIndicator(connectMode
                ? 'Connect: click first node to link, or click an edge to delete it'
                : 'Edit: dbl-click add, drag move, Ctrl+drag lift, Del remove, right-click set start'
            );
        });

        // Set start node button
        document.getElementById('btn-set-start').addEventListener('click', () => {
            if (selectedNodeId) {
                setStartNode(selectedNodeId);
            } else {
                updateModeIndicator('Select a node first, then click Set Start');
            }
        });

        // Save graph
        document.getElementById('btn-save-graph').addEventListener('click', saveGraph);

        // New graph
        document.getElementById('btn-new-graph').addEventListener('click', () => {
            if (graphNodes.length > 0 && !confirm('Clear current graph?')) return;
            clearGraph();
        });

        // Delete graph
        document.getElementById('btn-delete-graph').addEventListener('click', async () => {
            const names = await fetch('/api/graphs').then(r => r.json());
            if (names.length === 0) {
                alert('No saved graphs to delete.');
                return;
            }
            const name = prompt('Delete which graph?\n\nSaved: ' + names.join(', '));
            if (!name) return;
            if (!confirm('Permanently delete graph "' + name + '"?')) return;
            try {
                const resp = await fetch('/api/graph/delete/' + encodeURIComponent(name), { method: 'DELETE' });
                if (resp.ok) {
                    fetchGraphList();
                    // Also clear the active graph
                    await clearGraph();
                } else {
                    const err = await resp.json();
                    alert(err.error || 'Failed to delete graph');
                }
            } catch (e) {
                console.error('Failed to delete graph:', e);
            }
        });

        // Cycle scene orientation; persist per-scene.
        document.getElementById('btn-orient').addEventListener('click', () => {
            orientationIndex = (orientationIndex + 1) % ORIENTATION_PRESETS.length;
            applyOrientation(orientationIndex);
            persistOrientation(orientationIndex);
        });

        // Toggle walls: only affects structural mesh in orbit view; equipment always visible
        document.getElementById('btn-hide-walls').addEventListener('click', () => {
            wallsHidden = !wallsHidden;
            document.getElementById('btn-hide-walls').classList.toggle('active', wallsHidden);
            if (!fullMesh) return;
            fullMesh.visible = !wallsHidden;
        });

        // Load graph dropdown
        document.getElementById('graph-select').addEventListener('change', (e) => {
            if (e.target.value) {
                loadGraph(e.target.value);
                e.target.value = ''; // Reset dropdown
            }
        });

        // Camera view toggle. The legacy 3D View has been removed; Potree is
        // the default. YOLO remains as a passive overlay toggle.
        const btnViewYolo = document.getElementById('btn-view-yolo');
        const btnViewPotree = document.getElementById('btn-view-potree');
        const annotatedImage = document.getElementById('annotated-image');
        const robotCanvas = robotRenderer.domElement;

        function setView(mode) {
            // mode ∈ {'potree', 'yolo'}
            showYoloView   = (mode === 'yolo');
            potreeViewActive = (mode === 'potree');
            btnViewPotree.classList.toggle('active', mode === 'potree');
            btnViewYolo.classList.toggle('active',   mode === 'yolo');
            // The 3D robot canvas is no longer surfaced; keep it hidden so it
            // can still drive offscreen YOLO captures without painting.
            robotCanvas.style.display = 'none';
            potreeFrame.style.visibility    = (mode === 'potree') ? 'visible' : 'hidden';
            potreeFrame.style.pointerEvents = (mode === 'potree') ? 'auto'    : 'none';
            annotatedImage.style.display = (mode === 'yolo') ? 'block' : 'none';
            if (potreeViewActive) sendPotreePose();
        }

        btnViewPotree.addEventListener('click', () => setView('potree'));
        btnViewYolo.addEventListener('click',   () => setView('yolo'));

        // Default to Potree on load.
        setView('potree');

        // Start/Stop button — toggles live mode
        const btnStartStop = document.getElementById('btn-start-stop');
        btnStartStop.addEventListener('click', () => {
            liveMode = !liveMode;
            isStreaming = liveMode;

            if (liveMode) {
                // Enter live mode: spawn robot at start node
                btnStartStop.textContent = 'Stop';
                btnStartStop.classList.add('stop');

                // Exit edit mode if active
                if (editMode) {
                    editMode = false;
                    btnEditMode.classList.remove('active');
                    editOnlyControls.hidden = true;
                    connectMode = false;
                    document.getElementById('btn-add-edge').classList.remove('active');
                    closeEdgePanel();
                }

                // Snap robot to start node
                const spawnNode = startNodeId
                    ? graphNodes.find(n => n.id === startNodeId)
                    : graphNodes[0];
                if (spawnNode) {
                    robotPosition.set(spawnNode.position[0], spawnNode.position[1], spawnNode.position[2]);
                    robotCurrentNode = spawnNode.id;
                    robotYaw = 0;
                    robotMoving = false;
                    clearPathHighlight();
                    currentTargetNodeId = null;
                    document.getElementById('target-name').textContent = 'None';
                    updateRobotMarker();
                    updateRobotCamera();
                }

                robotGroup.visible = true;
                fpsResultCount = 0;
                fpsLastReset = performance.now();
                setRouteMode(routeMode);

                // Plan mode: drive the user-built plan immediately.
                if (routeMode === 'plan' && planWaypoints.length > 0) {
                    startPlan();
                }
            } else {
                // Exit live mode
                btnStartStop.textContent = 'Start';
                btnStartStop.classList.remove('stop');
                robotMoving = false;
                clearPathHighlight();
                currentTargetNodeId = null;
                document.getElementById('target-name').textContent = 'None';
                planActive = false;
                updateNodeVisuals();
                updateModeIndicator(routeMode === 'plan'
                    ? 'Plan: click nodes in order, press Start'
                    : 'Navigate: orbit view');
            }
        });

        // Route-mode toggle (Interactive / Plan) inside live mode
        const btnModeInteractive = document.getElementById('btn-mode-interactive');
        const btnModePlan = document.getElementById('btn-mode-plan');
        const planControls = document.getElementById('plan-controls');
        const routeModeGroup = document.getElementById('route-mode-group');

        function setRouteMode(mode) {
            routeMode = mode;
            btnModeInteractive.classList.toggle('active', mode === 'interactive');
            btnModePlan.classList.toggle('active', mode === 'plan');
            planControls.hidden = (mode !== 'plan');
            if (mode === 'plan') {
                renderPlanWaypoints();
                updateModeIndicator(liveMode
                    ? 'Plan: driving plan…'
                    : 'Plan: click nodes in order, press Start');
            } else {
                updateModeIndicator(liveMode
                    ? 'Live: click a waypoint to navigate'
                    : 'Navigate: orbit view');
            }
        }
        btnModeInteractive.addEventListener('click', () => setRouteMode('interactive'));
        btnModePlan.addEventListener('click', () => setRouteMode('plan'));
        document.getElementById('btn-plan-clear').addEventListener('click', clearPlan);
        document.getElementById('btn-plan-render').addEventListener('click', renderPlanFrames);

        // Speed slider
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        speedSlider.addEventListener('input', () => {
            robotSpeed = parseFloat(speedSlider.value);
            speedValue.textContent = robotSpeed.toFixed(1);
        });

        // ========================================================================
        // DETECTION LIST (safe DOM construction)
        // ========================================================================

        function updateDetectionList(detections) {
            const listEl = document.getElementById('detection-list');
            const countEl = document.getElementById('det-count');

            countEl.textContent = String(detections.length);

            // Clear existing children
            while (listEl.firstChild) {
                listEl.removeChild(listEl.firstChild);
            }

            if (detections.length === 0) {
                const noDetDiv = document.createElement('div');
                noDetDiv.className = 'no-detections';
                noDetDiv.textContent = 'No detections';
                listEl.appendChild(noDetDiv);
                return;
            }

            for (const det of detections) {
                const item = document.createElement('div');
                item.className = 'detection-item';

                const labelSpan = document.createElement('span');
                labelSpan.className = 'det-label';
                labelSpan.textContent = det.label;

                const confSpan = document.createElement('span');
                confSpan.className = 'det-confidence';
                confSpan.textContent = (det.confidence * 100).toFixed(1) + '%';

                item.appendChild(labelSpan);
                item.appendChild(confSpan);
                listEl.appendChild(item);
            }
        }

        // ========================================================================
        // MODE INDICATOR
        // ========================================================================

        function updateModeIndicator(text) {
            const indicator = document.getElementById('mode-indicator');
            indicator.textContent = text;
            indicator.classList.toggle('editing', editMode || connectMode);
        }

        // ========================================================================
        // RESIZE HANDLER
        // ========================================================================

        function handleResize() {
            // Orbit view
            const orbitW = orbitContainer.clientWidth;
            const orbitH = orbitContainer.clientHeight;
            if (orbitW > 0 && orbitH > 0) {
                orbitCamera.aspect = orbitW / orbitH;
                orbitCamera.updateProjectionMatrix();
                orbitRenderer.setSize(orbitW, orbitH);
            }

            // Robot camera stays fixed at 640x480
        }

        window.addEventListener('resize', handleResize);

        // ========================================================================
        // FPS COUNTER
        // ========================================================================

        function updateFPSCounter() {
            const now = performance.now();
            const elapsed = (now - fpsLastReset) / 1000;
            if (elapsed >= 1.0) {
                const fps = Math.round(fpsResultCount / elapsed);
                document.getElementById('fps-value').textContent = String(fps);
                fpsResultCount = 0;
                fpsLastReset = now;
            }
        }

        // ========================================================================
        // ANIMATION LOOP
        // ========================================================================

        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;
            robotDelta = Math.min(delta, 0.1);  // clamp to avoid big jumps

            // Update orbit controls
            orbitControls.update();

            // Update robot movement
            updateRobotMovement();

            // Update robot marker in orbit view
            updateRobotMarker();

            // Update robot camera
            updateRobotCamera();

            // Capture and send frames if streaming
            if (isStreaming) {
                captureAndSendFrame();
            }

            // Render orbit view (shows no-walls mesh if toggled)
            orbitRenderer.render(orbitScene, orbitCamera);

            // Render robot camera view — always show full scene, hide robot and graph
            if (!showYoloView || isStreaming) {
                robotGroup.visible = false;
                graphGroup.visible = false;
                const savedWallsVisible = fullMesh ? fullMesh.visible : true;
                if (fullMesh) fullMesh.visible = true;
                robotRenderer.render(robotScene, robotCamera);
                if (fullMesh) fullMesh.visible = savedWallsVisible;
                graphGroup.visible = true;
                robotGroup.visible = liveMode && !editMode;
            }

            // Update FPS counter
            updateFPSCounter();
        }

        animate();

        // ========================================================================
        // INITIAL SIZE FIX
        // ========================================================================

        // Wait for layout to settle before sizing
        requestAnimationFrame(() => {
            handleResize();
        });

    </script>
</body>
</html>
