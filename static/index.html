<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Patrol Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        #header {
            height: 40px;
            background: #252525;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #333;
            font-size: 15px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        #header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            margin-left: 12px;
        }

        #header .status-dot.connected { background: #4caf50; }
        #header .status-dot.disconnected { background: #f44336; }

        #main {
            display: flex;
            height: calc(100vh - 40px - 50px);
        }

        #left-panel {
            flex: 1;
            position: relative;
            border-right: 1px solid #333;
        }

        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        #orbit-canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Right panel sub-sections */
        #robot-camera-section {
            flex: 1;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        #robot-camera-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: #252525;
            border-bottom: 1px solid #333;
            font-size: 12px;
        }

        #robot-camera-header .toggle-group {
            display: flex;
            gap: 4px;
        }

        #robot-camera-header button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #aaa;
            padding: 3px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        #robot-camera-header button:hover { background: rgba(255,255,255,0.15); color: #ddd; }
        #robot-camera-header button.active { background: rgba(76,175,80,0.4); color: #fff; }

        #robot-camera-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            min-height: 0;
        }

        #robot-canvas-container {
            position: relative;
            width: 640px;
            height: 480px;
            max-width: 100%;
            max-height: 100%;
        }

        #robot-canvas-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #annotated-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            pointer-events: none;
        }

        #detection-panel {
            max-height: 180px;
            overflow-y: auto;
            background: #1e1e1e;
            border-top: 1px solid #333;
            padding: 8px 12px;
            font-size: 12px;
        }

        #detection-panel .det-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: #888;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .detection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 8px;
            margin: 2px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            font-size: 12px;
        }

        .detection-item .det-label {
            color: #e0e0e0;
        }

        .detection-item .det-confidence {
            color: #4caf50;
            font-family: monospace;
            font-size: 11px;
        }

        .no-detections {
            color: #555;
            font-style: italic;
            font-size: 12px;
        }

        /* Controls bar */
        #controls-bar {
            height: 50px;
            background: #252525;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }

        #controls-bar button {
            background: rgba(255,255,255,0.12);
            border: none;
            color: #ddd;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        #controls-bar button:hover { background: rgba(255,255,255,0.18); }
        #controls-bar button.active {
            background: rgba(76,175,80,0.5);
            color: #fff;
        }
        #controls-bar button.stop {
            background: rgba(244,67,54,0.5);
            color: #fff;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }

        .control-group label {
            white-space: nowrap;
        }

        .control-group input[type="range"] {
            width: 100px;
            accent-color: #4caf50;
        }

        .control-group .value {
            min-width: 32px;
            text-align: right;
            font-family: monospace;
            color: #ccc;
        }

        .control-spacer { flex: 1; }

        #target-display {
            font-size: 12px;
            color: #888;
        }

        #target-display span {
            color: #ff9800;
            font-weight: 500;
        }

        #fps-display {
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }

        #fps-display span {
            color: #4caf50;
        }

        /* Graph editor toolbar overlay on left panel */
        #graph-toolbar {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }

        #graph-toolbar button {
            background: rgba(30,30,30,0.85);
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        #graph-toolbar button:hover { background: rgba(60,60,60,0.9); color: #fff; }
        #graph-toolbar button.active { background: rgba(76,175,80,0.5); border-color: #4caf50; color: #fff; }

        #graph-toolbar select {
            background: rgba(30,30,30,0.85);
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        #graph-toolbar select option {
            background: #2a2a2a;
            color: #ccc;
        }

        /* Mode indicator overlay */
        #mode-indicator {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(30,30,30,0.85);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }

        #mode-indicator.editing { color: #ff9800; }

        /* Node info tooltip */
        #node-tooltip {
            position: absolute;
            background: rgba(20,20,20,0.95);
            color: #ddd;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            z-index: 20;
            border: 1px solid #444;
        }

        /* Loading overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26,26,26,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-size: 16px;
            color: #888;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="header">
        Robot Patrol Simulator
        <div class="status-dot" id="connection-dot" title="Socket.IO disconnected"></div>
    </div>

    <div id="main">
        <!-- Left Panel: 3D Orbit Scene -->
        <div id="left-panel">
            <div id="orbit-canvas-container"></div>
            <div id="graph-toolbar">
                <button id="btn-edit-mode" title="Toggle graph editor">Edit Graph</button>
                <button id="btn-add-edge" title="Connect two nodes">Connect Nodes</button>
                <button id="btn-set-start" title="Set selected node as start">Set Start</button>
                <button id="btn-new-graph" title="Clear current graph">New Graph</button>
                <button id="btn-save-graph" title="Save current graph">Save Graph</button>
                <button id="btn-delete-graph" title="Delete a saved graph">Delete Graph</button>
                <button id="btn-hide-walls" class="active" title="Clip near-side geometry">Hide Walls</button>
                <button id="btn-orient" title="Cycle scene orientation (saved per scene)">Orient ↻</button>
                <select id="graph-select" title="Load a saved graph">
                    <option value="">-- Load Graph --</option>
                </select>
            </div>
            <div id="mode-indicator">Navigate: orbit view</div>
            <div id="node-tooltip"></div>
            <div id="loading-overlay">Loading mesh...</div>
        </div>

        <!-- Right Panel: Robot Camera -->
        <div id="right-panel">
            <div id="robot-camera-section">
                <div id="robot-camera-header">
                    <span>Robot Camera</span>
                    <div class="toggle-group">
                        <button id="btn-view-3d" class="active">3D View</button>
                        <button id="btn-view-yolo">YOLO View</button>
                    </div>
                </div>
                <div id="robot-camera-wrapper">
                    <div id="robot-canvas-container"></div>
                    <img id="annotated-image" alt="Annotated frame">
                </div>
            </div>
            <div id="detection-panel">
                <div class="det-header">
                    <span>Detections</span>
                    <span id="det-count">0</span>
                </div>
                <div id="detection-list">
                    <div class="no-detections">No detections</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls Bar -->
    <div id="controls-bar">
        <button id="btn-start-stop">Start</button>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1.0">
            <span class="value" id="speed-value">1.0</span>
        </div>
        <div id="target-display">Target: <span id="target-name">None</span></div>
        <div class="control-spacer"></div>
        <div id="fps-display">FPS: <span id="fps-value">0</span></div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ========================================================================
        // STATE
        // ========================================================================

        // Graph data: nodes and edges
        let graphNodes = [];       // [{id, position: [x,y,z]}]
        let graphEdges = [];       // [{from, to}]
        let graphNodeMeshes = {};  // id -> THREE.Mesh
        let graphEdgeLines = [];   // THREE.Line objects in scene
        let startNodeId = null;    // designated start node

        // Robot state
        let robotPosition = new THREE.Vector3(0, 0.5, 0);
        let robotYaw = 0;
        let robotPitch = 0;
        let robotPath = [];            // node IDs from server
        let robotPathPositions = [];   // resolved Vector3 positions
        let robotMoving = false;
        let robotSpeed = 1.0;
        let robotDelta = 1 / 60;  // frame delta in seconds
        let robotCurrentNode = null;   // last node the robot arrived at

        // Live mode: robot is active and navigating
        let liveMode = false;

        // Editor state
        let editMode = false;
        let connectMode = false;
        let firstSelectedNode = null;   // for edge creation
        let hoveredNodeId = null;
        let selectedNodeId = null;
        let draggingNodeId = null;
        let isDragging = false;

        // Streaming state
        let isStreaming = false;
        let lastFrameTime = 0;
        const FRAME_INTERVAL_MS = 100;  // 10 FPS capture rate

        // Detection pipeline FPS counter
        let fpsResultCount = 0;
        let fpsLastReset = performance.now();

        // Camera view toggle
        let showYoloView = false;

        // Target
        let currentTargetNodeId = null;

        // ========================================================================
        // SOCKET.IO
        // ========================================================================

        const socket = io();

        const connectionDot = document.getElementById('connection-dot');

        socket.on('connect', () => {
            connectionDot.classList.add('connected');
            connectionDot.classList.remove('disconnected');
            connectionDot.title = 'Socket.IO connected';
        });

        socket.on('disconnect', () => {
            connectionDot.classList.remove('connected');
            connectionDot.classList.add('disconnected');
            connectionDot.title = 'Socket.IO disconnected';
        });

        socket.on('result', (data) => {
            // data: {image: dataUrl, detections: [{label, confidence, bbox: [x1,y1,x2,y2]}, ...]}
            fpsResultCount++;

            // Update annotated image
            if (data.annotated_frame) {
                const annotatedImg = document.getElementById('annotated-image');
                annotatedImg.src = data.annotated_frame;
            }

            // Update detection list
            if (data.detections) {
                updateDetectionList(data.detections);
            }
        });

        socket.on('robot_path', (data) => {
            // data: {path: [nodeId1, nodeId2, ...]}
            if (data.path && data.path.length > 0) {
                startRobotMovement(data.path);
            }
        });

        // ========================================================================
        // THREE.JS -- ORBIT VIEW (left panel)
        // ========================================================================

        const orbitContainer = document.getElementById('orbit-canvas-container');
        const orbitScene = new THREE.Scene();
        orbitScene.background = new THREE.Color(0x1a1a1a);

        const orbitCamera = new THREE.PerspectiveCamera(
            60,
            orbitContainer.clientWidth / orbitContainer.clientHeight,
            0.1,
            1000
        );
        orbitCamera.position.set(10, 15, 10);

        const orbitRenderer = new THREE.WebGLRenderer({ antialias: true });
        orbitRenderer.setSize(orbitContainer.clientWidth, orbitContainer.clientHeight);
        orbitRenderer.setPixelRatio(window.devicePixelRatio);
        orbitRenderer.shadowMap.enabled = true;
        orbitRenderer.toneMapping = THREE.NoToneMapping;
        orbitRenderer.toneMappingExposure = 1.5;
        orbitContainer.appendChild(orbitRenderer.domElement);

        // Wall toggle: switch between full mesh and no-walls mesh
        let wallsHidden = true;
        let meshBBox = null;
        let fullMesh = null;
        let noWallsMesh = null;

        const orbitControls = new OrbitControls(orbitCamera, orbitRenderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.1;
        orbitControls.target.set(0, 0, 0);

        // Lighting for orbit scene
        const orbitAmbient = new THREE.AmbientLight(0xffffff, 4.5);
        orbitScene.add(orbitAmbient);

        const orbitHemi = new THREE.HemisphereLight(0xffffff, 0xffffff, 2.0);
        orbitScene.add(orbitHemi);

        const orbitDirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        orbitDirLight.position.set(10, 20, 10);
        orbitDirLight.castShadow = true;
        orbitScene.add(orbitDirLight);

        const orbitDirLight2 = new THREE.DirectionalLight(0xffffff, 1.2);
        orbitDirLight2.position.set(-10, 10, -10);
        orbitScene.add(orbitDirLight2);

        const orbitDirLight3 = new THREE.DirectionalLight(0xffffff, 1.0);
        orbitDirLight3.position.set(0, -10, 0);
        orbitScene.add(orbitDirLight3);

        // Grid helper for reference
        const gridHelper = new THREE.GridHelper(50, 50, 0x333333, 0x222222);
        orbitScene.add(gridHelper);

        // Collision mesh reference (for raycasting floor clicks)
        let collisionMesh = null;

        // Invisible floor plane for reliable raycasting (fallback when mesh raycast misses)
        const floorPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        floorPlane.rotation.x = -Math.PI / 2; // horizontal
        floorPlane.position.y = 0;
        orbitScene.add(floorPlane);

        // ========================================================================
        // ROBOT MARKER
        // ========================================================================

        const robotGroup = new THREE.Group();

        // Robot body - orange box
        const robotBodyGeo = new THREE.BoxGeometry(0.6, 0.4, 0.8);
        const robotBodyMat = new THREE.MeshPhongMaterial({ color: 0xff8800 });
        const robotBody = new THREE.Mesh(robotBodyGeo, robotBodyMat);
        robotBody.position.y = 0.2;
        robotGroup.add(robotBody);

        // Robot heading cone (points forward)
        const robotConeGeo = new THREE.ConeGeometry(0.15, 0.4, 8);
        const robotConeMat = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
        const robotCone = new THREE.Mesh(robotConeGeo, robotConeMat);
        robotCone.rotation.x = -Math.PI / 2;
        robotCone.position.set(0, 0.3, -0.5);
        robotGroup.add(robotCone);

        // Small camera representation on top
        const robotCamGeo = new THREE.BoxGeometry(0.2, 0.15, 0.15);
        const robotCamMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const robotCam = new THREE.Mesh(robotCamGeo, robotCamMat);
        robotCam.position.set(0, 0.47, -0.15);
        robotGroup.add(robotCam);

        robotGroup.position.copy(robotPosition);
        orbitScene.add(robotGroup);

        // ========================================================================
        // THREE.JS -- ROBOT CAMERA (right panel)
        // ========================================================================

        const robotCanvasContainer = document.getElementById('robot-canvas-container');

        const robotScene = orbitScene; // Same scene, different camera
        const robotCamera = new THREE.PerspectiveCamera(60, 640 / 480, 0.1, 500);
        robotCamera.position.copy(robotPosition);
        robotCamera.position.y += 1.0; // Camera at ~1m height

        const robotRenderer = new THREE.WebGLRenderer({
            antialias: true,
            preserveDrawingBuffer: true
        });
        robotRenderer.setSize(640, 480);
        robotRenderer.setPixelRatio(1); // Fixed resolution for streaming
        robotCanvasContainer.appendChild(robotRenderer.domElement);

        // ========================================================================
        // MESH LOADING
        // ========================================================================

        const gltfLoader = new GLTFLoader();
        const loadingOverlay = document.getElementById('loading-overlay');

        // Orientation presets: 6 axis-aligned "up" directions.
        // Each entry is an Euler rotation (XYZ order) applied to the mesh.
        const ORIENTATION_PRESETS = [
            { name: 'Y+', rot: [0, 0, 0] },
            { name: 'Z+', rot: [-Math.PI / 2, 0, 0] },
            { name: 'X+', rot: [0, 0, Math.PI / 2] },
            { name: 'Y-', rot: [Math.PI, 0, 0] },
            { name: 'Z-', rot: [Math.PI / 2, 0, 0] },
            { name: 'X-', rot: [0, 0, -Math.PI / 2] },
        ];
        let orientationIndex = 0;

        function autoDetectOrientationIndex(mesh) {
            // Save then clear rotation to measure raw bbox.
            const prev = mesh.rotation.clone();
            mesh.rotation.set(0, 0, 0);
            mesh.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(mesh);
            const s = box.getSize(new THREE.Vector3());
            mesh.rotation.copy(prev);
            mesh.updateMatrixWorld(true);
            if (s.z < s.x && s.z < s.y) return 1; // Z+ up
            if (s.x < s.y && s.x < s.z) return 2; // X+ up
            return 0;                              // Y+ up (default)
        }

        function applyOrientation(idx) {
            if (!fullMesh) return;
            const r = ORIENTATION_PRESETS[idx].rot;
            fullMesh.rotation.set(r[0], r[1], r[2]);
            fullMesh.updateMatrixWorld(true);
            if (noWallsMesh) {
                noWallsMesh.rotation.set(r[0], r[1], r[2]);
                noWallsMesh.updateMatrixWorld(true);
            }

            const box = new THREE.Box3().setFromObject(fullMesh);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            meshBBox = box;
            window._debugBBox = {min:{x:box.min.x,y:box.min.y,z:box.min.z}, max:{x:box.max.x,y:box.max.y,z:box.max.z}, size:{x:size.x,y:size.y,z:size.z}};

            orbitControls.target.copy(center);
            orbitCamera.position.set(
                center.x + size.x * 0.8,
                center.y + size.y * 1.5,
                center.z + size.z * 0.8
            );
            orbitControls.update();

            floorPlane.position.set(center.x, box.min.y, center.z);
            gridHelper.position.y = box.min.y;

            robotPosition.set(center.x, box.min.y + 0.01, center.z);
            robotGroup.position.copy(robotPosition);
            updateRobotCamera();

            const btn = document.getElementById('btn-orient');
            if (btn) btn.textContent = 'Orient ' + ORIENTATION_PRESETS[idx].name;
        }

        async function persistOrientation(idx) {
            try {
                await fetch('/api/orientation', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ index: idx }),
                });
            } catch (e) { console.warn('Could not persist orientation:', e); }
        }

        gltfLoader.load(
            '/mesh.glb',
            async (gltf) => {
                const mesh = gltf.scene;
                mesh.traverse((obj) => {
                    if (obj.isMesh && obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        for (const m of mats) {
                            if (obj.geometry?.attributes?.color) m.vertexColors = true;
                            m.side = THREE.DoubleSide;
                            m.needsUpdate = true;
                        }
                    }
                });

                orbitScene.add(mesh);
                collisionMesh = mesh;
                fullMesh = mesh;
                window._debugMesh = mesh;

                // Pick orientation: saved override → auto-detect.
                let savedIdx = null;
                try {
                    const r = await fetch('/api/orientation');
                    const data = await r.json();
                    if (data && Number.isInteger(data.index)) savedIdx = data.index;
                } catch (e) {}
                orientationIndex = savedIdx !== null ? savedIdx : autoDetectOrientationIndex(mesh);

                fullMesh.visible = !wallsHidden;

                // Load no-walls version (equipment) — always visible
                gltfLoader.load('/mesh_no_walls.glb', (gltf2) => {
                    noWallsMesh = gltf2.scene;
                    noWallsMesh.visible = true;
                    orbitScene.add(noWallsMesh);
                    applyOrientation(orientationIndex);
                    console.log('No-walls mesh loaded');
                }, undefined, () => {
                    // No no-walls mesh supplied — show full mesh in orbit view
                    wallsHidden = false;
                    fullMesh.visible = true;
                    document.getElementById('btn-hide-walls')?.classList.remove('active');
                });

                applyOrientation(orientationIndex);

                loadingOverlay.classList.add('hidden');

                // Load graph list; auto-load default if it exists
                fetchGraphList().then(() => {
                    const select = document.getElementById('graph-select');
                    const hasDefault = Array.from(select.options).some(o => o.value === 'default');
                    if (hasDefault) {
                        loadGraph('default');
                    }
                });
            },
            (progress) => {
                if (progress.total > 0) {
                    const pct = Math.round((progress.loaded / progress.total) * 100);
                    loadingOverlay.textContent = 'Loading mesh... ' + pct + '%';
                }
            },
            (error) => {
                console.error('Error loading mesh:', error);
                loadingOverlay.textContent = 'Error loading mesh. Make sure mesh.glb exists.';
            }
        );

        // ========================================================================
        // NAVIGATION GRAPH RENDERING
        // ========================================================================

        const nodeGeometry = new THREE.SphereGeometry(0.15, 12, 12);
        const postGeometry = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
        const postMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
        const nodeMaterialDefault = new THREE.MeshPhongMaterial({ color: 0x44cc44 });
        const nodeMaterialHovered = new THREE.MeshPhongMaterial({ color: 0x88ff88 });
        const nodeMaterialSelected = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
        const nodeMaterialTarget = new THREE.MeshPhongMaterial({ color: 0xff4444 });
        const nodeMaterialStart = new THREE.MeshPhongMaterial({ color: 0x2196f3 });
        const edgeMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.7 });
        const pathHighlightMaterial = new THREE.MeshPhongMaterial({ color: 0x00aaff });

        // Group for all graph objects
        const graphGroup = new THREE.Group();
        orbitScene.add(graphGroup);

        // Active path highlight lines
        let pathHighlightLines = [];

        const NODE_HEIGHT = 0.5;  // how high above floor the node sphere sits
        const EDGE_RADIUS = 0.02; // tube radius for edges

        function renderGraph() {
            // Clear existing graph visuals
            while (graphGroup.children.length > 0) {
                graphGroup.remove(graphGroup.children[0]);
            }
            graphNodeMeshes = {};
            graphEdgeLines = [];

            // Render nodes with posts
            for (const node of graphNodes) {
                const x = node.position[0];
                const y = node.position[1];
                const z = node.position[2];

                // Post (vertical cylinder from floor to node)
                const post = new THREE.Mesh(postGeometry, postMaterial);
                post.position.set(x, y + NODE_HEIGHT / 2, z);
                post.scale.y = NODE_HEIGHT;
                graphGroup.add(post);

                // Node sphere at top of post
                const mesh = new THREE.Mesh(nodeGeometry, nodeMaterialDefault.clone());
                mesh.position.set(x, y + NODE_HEIGHT, z);
                mesh.userData.nodeId = node.id;
                graphGroup.add(mesh);
                graphNodeMeshes[node.id] = mesh;
            }

            // Render edges as tubes raised to node height
            for (const edge of graphEdges) {
                const fromNode = graphNodes.find(n => n.id === edge.from);
                const toNode = graphNodes.find(n => n.id === edge.to);
                if (!fromNode || !toNode) continue;

                const from = new THREE.Vector3(
                    fromNode.position[0], fromNode.position[1] + NODE_HEIGHT, fromNode.position[2]
                );
                const to = new THREE.Vector3(
                    toNode.position[0], toNode.position[1] + NODE_HEIGHT, toNode.position[2]
                );

                // Cylinder between the two points
                const dir = to.clone().sub(from);
                const length = dir.length();
                const mid = from.clone().add(to).multiplyScalar(0.5);

                const cylGeom = new THREE.CylinderGeometry(EDGE_RADIUS, EDGE_RADIUS, length, 6);
                const cyl = new THREE.Mesh(cylGeom, edgeMaterial);
                cyl.position.copy(mid);
                // Align cylinder along the direction
                cyl.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0), dir.clone().normalize()
                );
                cyl.userData.edgeFrom = edge.from;
                cyl.userData.edgeTo = edge.to;
                graphGroup.add(cyl);
                graphEdgeLines.push(cyl);
            }

            updateNodeVisuals();
        }

        function updateNodeVisuals() {
            for (const node of graphNodes) {
                const mesh = graphNodeMeshes[node.id];
                if (!mesh) continue;

                if (node.id === currentTargetNodeId) {
                    mesh.material = nodeMaterialTarget;
                    mesh.scale.setScalar(1.3);
                } else if (node.id === selectedNodeId) {
                    mesh.material = nodeMaterialSelected;
                    mesh.scale.setScalar(1.2);
                } else if (node.id === hoveredNodeId) {
                    mesh.material = nodeMaterialHovered;
                    mesh.scale.setScalar(1.1);
                } else if (node.id === startNodeId) {
                    mesh.material = nodeMaterialStart;
                    mesh.scale.setScalar(1.2);
                } else {
                    mesh.material = nodeMaterialDefault.clone();
                    mesh.scale.setScalar(1.0);
                }
            }
        }

        function clearPathHighlight() {
            for (const line of pathHighlightLines) {
                graphGroup.remove(line);
            }
            pathHighlightLines = [];
        }

        function highlightPath(nodeIds) {
            clearPathHighlight();

            for (let i = 0; i < nodeIds.length - 1; i++) {
                const fromNode = graphNodes.find(n => n.id === nodeIds[i]);
                const toNode = graphNodes.find(n => n.id === nodeIds[i + 1]);
                if (!fromNode || !toNode) continue;

                const from = new THREE.Vector3(
                    fromNode.position[0], fromNode.position[1] + NODE_HEIGHT + 0.05, fromNode.position[2]
                );
                const to = new THREE.Vector3(
                    toNode.position[0], toNode.position[1] + NODE_HEIGHT + 0.05, toNode.position[2]
                );
                const dir = to.clone().sub(from);
                const length = dir.length();
                const mid = from.clone().add(to).multiplyScalar(0.5);

                const cylGeom = new THREE.CylinderGeometry(EDGE_RADIUS * 1.5, EDGE_RADIUS * 1.5, length, 6);
                const cyl = new THREE.Mesh(cylGeom, pathHighlightMaterial);
                cyl.position.copy(mid);
                cyl.quaternion.setFromUnitVectors(
                    new THREE.Vector3(0, 1, 0), dir.clone().normalize()
                );
                graphGroup.add(cyl);
                pathHighlightLines.push(cyl);
            }
        }

        // ========================================================================
        // CATMULL-ROM SPLINE INTERPOLATION (from indoor-walk)
        // ========================================================================

        function catmullRomSpline(points, segments) {
            if (!segments) segments = 20;
            if (points.length < 2) return points.slice();
            if (points.length === 2) {
                const result = [];
                for (let t = 0; t <= 1; t += 1 / segments) {
                    result.push(points[0].clone().lerp(points[1], t));
                }
                return result;
            }

            // Add phantom points at start and end
            const extended = [
                points[0].clone().sub(points[1].clone().sub(points[0])),
                ...points,
                points[points.length - 1].clone().add(
                    points[points.length - 1].clone().sub(points[points.length - 2])
                )
            ];

            const result = [];
            for (let i = 1; i < extended.length - 2; i++) {
                const p0 = extended[i - 1];
                const p1 = extended[i];
                const p2 = extended[i + 1];
                const p3 = extended[i + 2];
                const isLast = i === extended.length - 3;

                for (let j = 0; j < segments; j++) {
                    if (!isLast && j === segments - 1) continue;
                    const t = j / segments;
                    const t2 = t * t;
                    const t3 = t2 * t;

                    const x = 0.5 * (
                        (2 * p1.x) +
                        (-p0.x + p2.x) * t +
                        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
                    );
                    const y = 0.5 * (
                        (2 * p1.y) +
                        (-p0.y + p2.y) * t +
                        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
                    );
                    const z = 0.5 * (
                        (2 * p1.z) +
                        (-p0.z + p2.z) * t +
                        (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 +
                        (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3
                    );

                    result.push(new THREE.Vector3(x, y, z));
                }
            }
            result.push(points[points.length - 1].clone());
            return result;
        }

        function samplePathByDistance(points, speed, dt) {
            if (points.length < 2) {
                return points.map(p => ({
                    pos: p,
                    dir: new THREE.Vector3(0, 0, -1)
                }));
            }

            const samples = [];
            let totalDist = 0;
            const segmentLengths = [];

            for (let i = 1; i < points.length; i++) {
                const len = points[i].distanceTo(points[i - 1]);
                segmentLengths.push(len);
                totalDist += len;
            }

            const stepDist = speed * dt;
            let currentDist = 0;
            let segIdx = 0;
            let segStart = 0;

            while (currentDist <= totalDist) {
                while (segIdx < segmentLengths.length - 1 &&
                       currentDist - segStart > segmentLengths[segIdx]) {
                    segStart += segmentLengths[segIdx];
                    segIdx++;
                }

                const segLen = segmentLengths[segIdx];
                const t = segLen > 0 ? (currentDist - segStart) / segLen : 0;
                const pos = points[segIdx].clone().lerp(
                    points[segIdx + 1],
                    Math.min(1, Math.max(0, t))
                );
                const dir = points[segIdx + 1].clone().sub(points[segIdx]).normalize();

                samples.push({ pos, dir });
                currentDist += stepDist;
            }

            // Final sample at end
            samples.push({
                pos: points[points.length - 1].clone(),
                dir: samples.length > 0
                    ? samples[samples.length - 1].dir.clone()
                    : new THREE.Vector3(0, 0, -1)
            });

            return samples;
        }

        // ========================================================================
        // ROBOT MOVEMENT
        // ========================================================================

        // Index into robotPathPositions: the node we're currently moving toward
        let robotPathTargetIdx = 0;

        function startRobotMovement(nodeIds) {
            robotPath = nodeIds;

            // Resolve node IDs to 3D positions
            robotPathPositions = [];
            for (const id of nodeIds) {
                const node = graphNodes.find(n => n.id === id);
                if (node) {
                    robotPathPositions.push(
                        new THREE.Vector3(node.position[0], node.position[1], node.position[2])
                    );
                }
            }

            if (robotPathPositions.length < 2) {
                console.warn('Path too short for movement');
                return;
            }

            // Highlight path in orbit view
            highlightPath(nodeIds);

            // Start linear node-to-node movement
            robotPathTargetIdx = 1;
            robotMoving = true;

            document.getElementById('target-name').textContent = nodeIds[nodeIds.length - 1];
            currentTargetNodeId = nodeIds[nodeIds.length - 1];
            updateNodeVisuals();
        }

        function updateRobotMovement() {
            if (!robotMoving || robotPathPositions.length === 0) return;

            if (robotPathTargetIdx >= robotPathPositions.length) {
                // Arrived at final node
                robotMoving = false;
                clearPathHighlight();

                const finalPos = robotPathPositions[robotPathPositions.length - 1];
                robotPosition.copy(finalPos);
                robotCurrentNode = robotPath[robotPath.length - 1];

                currentTargetNodeId = null;
                document.getElementById('target-name').textContent = 'None';
                updateNodeVisuals();
                return;
            }

            const target = robotPathPositions[robotPathTargetIdx];
            const dx = target.x - robotPosition.x;
            const dy = target.y - robotPosition.y;
            const dz = target.z - robotPosition.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

            // Distance to move this frame (speed is units/sec, delta comes from animate loop)
            const stepDist = robotSpeed * robotDelta;

            if (dist <= stepDist) {
                // Snap to this node and advance to next segment
                robotPosition.copy(target);
                if (dist > 1e-6) {
                    robotYaw = Math.atan2(-dx, -dz);
                }
                // Track which node we just arrived at
                robotCurrentNode = robotPath[robotPathTargetIdx];
                robotPathTargetIdx++;

                // If there's a pending re-target, repath from this node
                if (pendingTarget) {
                    const newTarget = pendingTarget;
                    pendingTarget = null;
                    robotMoving = false;
                    clearPathHighlight();
                    socket.emit('robot_command', {
                        target: newTarget,
                        from_node: robotCurrentNode
                    });
                    return;
                }
            } else {
                // Move toward the target node
                const frac = stepDist / dist;
                robotPosition.x += dx * frac;
                robotPosition.y += dy * frac;
                robotPosition.z += dz * frac;
                robotYaw = Math.atan2(-dx, -dz);
            }
        }

        function updateRobotMarker() {
            robotGroup.position.copy(robotPosition);
            robotGroup.rotation.y = robotYaw;
        }

        function updateRobotCamera() {
            // Position camera at robot's camera location
            robotCamera.position.set(
                robotPosition.x,
                robotPosition.y + 1.0,
                robotPosition.z
            );
            robotCamera.rotation.order = 'YXZ';
            robotCamera.rotation.y = robotYaw;
            robotCamera.rotation.x = robotPitch;
        }

        // ========================================================================
        // FRAME STREAMING
        // ========================================================================

        function captureAndSendFrame() {
            if (!isStreaming) return;

            const now = performance.now();
            if (now - lastFrameTime < FRAME_INTERVAL_MS) return;
            lastFrameTime = now;

            // Render robot camera with full scene (both meshes), robot and graph hidden
            robotGroup.visible = false;
            graphGroup.visible = false;
            const savedWallsVis = fullMesh ? fullMesh.visible : true;
            if (fullMesh) fullMesh.visible = true;
            robotRenderer.render(robotScene, robotCamera);
            if (fullMesh) fullMesh.visible = savedWallsVis;
            graphGroup.visible = true;
            robotGroup.visible = true;

            // Capture as JPEG
            const dataUrl = robotRenderer.domElement.toDataURL('image/jpeg', 0.8);

            // Send via socket
            socket.emit('frame', { image: dataUrl });
        }

        // ========================================================================
        // GRAPH EDITOR -- RAYCASTING
        // ========================================================================

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function getMousePosition(event, container) {
            const rect = container.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function getNodeAtMouse(event) {
            getMousePosition(event, orbitContainer);
            raycaster.setFromCamera(mouse, orbitCamera);

            const nodeMeshes = Object.values(graphNodeMeshes);
            if (nodeMeshes.length === 0) return null;

            const intersects = raycaster.intersectObjects(nodeMeshes, false);
            if (intersects.length > 0) {
                return intersects[0].object.userData.nodeId;
            }
            return null;
        }

        function getFloorPosition(event) {
            getMousePosition(event, orbitContainer);
            raycaster.setFromCamera(mouse, orbitCamera);

            // Try mesh first
            if (collisionMesh) {
                const meshHits = raycaster.intersectObject(collisionMesh, true);
                if (meshHits.length > 0) {
                    return meshHits[0].point;
                }
            }

            // Fallback to invisible floor plane
            const planeHits = raycaster.intersectObject(floorPlane, false);
            if (planeHits.length > 0) {
                return planeHits[0].point;
            }
            return null;
        }

        // ========================================================================
        // GRAPH EDITOR -- EVENT HANDLERS
        // ========================================================================

        orbitContainer.addEventListener('mousemove', (e) => {
            const nodeId = getNodeAtMouse(e);
            if (nodeId !== hoveredNodeId) {
                hoveredNodeId = nodeId;
                updateNodeVisuals();

                // Update tooltip
                const tooltip = document.getElementById('node-tooltip');
                if (nodeId !== null) {
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) {
                        tooltip.textContent = 'Node: ' + nodeId;
                        tooltip.style.display = 'block';
                        tooltip.style.left = (e.clientX - orbitContainer.getBoundingClientRect().left + 15) + 'px';
                        tooltip.style.top = (e.clientY - orbitContainer.getBoundingClientRect().top - 10) + 'px';
                    }
                } else {
                    tooltip.style.display = 'none';
                }
            } else if (hoveredNodeId !== null) {
                // Update tooltip position on move
                const tooltip = document.getElementById('node-tooltip');
                tooltip.style.left = (e.clientX - orbitContainer.getBoundingClientRect().left + 15) + 'px';
                tooltip.style.top = (e.clientY - orbitContainer.getBoundingClientRect().top - 10) + 'px';
            }

            // Update cursor
            orbitRenderer.domElement.style.cursor = nodeId !== null ? 'pointer' : '';
        });

        let mouseDownPos = null;
        const DRAG_THRESHOLD = 5; // pixels before a click becomes a drag

        orbitContainer.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // left button only
            mouseDownPos = { x: e.clientX, y: e.clientY };

            if (editMode && !connectMode) {
                const nodeId = getNodeAtMouse(e);
                if (nodeId !== null) {
                    draggingNodeId = nodeId;
                    isDragging = false; // not yet, need to exceed threshold
                }
            }
        });

        orbitContainer.addEventListener('mousemove', (e) => {
            if (draggingNodeId && mouseDownPos) {
                const dx = e.clientX - mouseDownPos.x;
                const dy = e.clientY - mouseDownPos.y;
                if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
                    if (!isDragging) {
                        isDragging = true;
                        orbitControls.enabled = false; // disable orbit while dragging
                    }
                    // Move node to floor position under cursor
                    const floorPos = getFloorPosition(e);
                    if (floorPos) {
                        const node = graphNodes.find(n => n.id === draggingNodeId);
                        if (node) {
                            node.position = [
                                Math.round(floorPos.x * 100) / 100,
                                Math.round(floorPos.y * 100) / 100,
                                Math.round(floorPos.z * 100) / 100
                            ];
                            renderGraph();
                        }
                    }
                }
            }
        });

        orbitContainer.addEventListener('mouseup', (e) => {
            if (e.button !== 0) return;

            if (isDragging && draggingNodeId) {
                // Finish drag — sync to server
                const node = graphNodes.find(n => n.id === draggingNodeId);
                if (node) {
                    moveNode(draggingNodeId, { x: node.position[0], y: node.position[1], z: node.position[2] });
                }
                orbitControls.enabled = true;
                draggingNodeId = null;
                isDragging = false;
                mouseDownPos = null;
                return;
            }

            draggingNodeId = null;
            isDragging = false;
            orbitControls.enabled = true;

            // Treat as click
            const clickedNodeId = getNodeAtMouse(e);

            if (connectMode) {
                if (clickedNodeId !== null) {
                    if (firstSelectedNode === null) {
                        firstSelectedNode = clickedNodeId;
                        selectedNodeId = clickedNodeId;
                        updateNodeVisuals();
                        updateModeIndicator('Select second node to connect');
                    } else if (clickedNodeId !== firstSelectedNode) {
                        createEdge(firstSelectedNode, clickedNodeId);
                        firstSelectedNode = null;
                        selectedNodeId = null;
                        connectMode = false;
                        document.getElementById('btn-add-edge').classList.remove('active');
                        updateNodeVisuals();
                        updateModeIndicator(editMode ? 'Edit: dbl-click add, drag move, Del remove, right-click set start' : 'Navigate: orbit view');
                    }
                }
                mouseDownPos = null;
                return;
            }

            if (editMode) {
                if (clickedNodeId !== null) {
                    // Click on node -> select/deselect
                    if (selectedNodeId === clickedNodeId) {
                        selectedNodeId = null;
                    } else {
                        selectedNodeId = clickedNodeId;
                    }
                    updateNodeVisuals();
                }
                // Single click on empty floor does nothing (double-click to add)
                mouseDownPos = null;
                return;
            }

            // Live mode: click a node to navigate robot there
            if (liveMode && clickedNodeId !== null) {
                setRobotTarget(clickedNodeId);
            }
            mouseDownPos = null;
        });

        orbitContainer.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!editMode) return;
            const nodeId = getNodeAtMouse(e);
            if (nodeId !== null) {
                setStartNode(nodeId);
            }
        });

        // Double-click to add node in edit mode
        orbitContainer.addEventListener('dblclick', (e) => {
            if (!editMode || connectMode) return;
            const floorPos = getFloorPosition(e);
            if (floorPos) {
                addNode(floorPos);
            }
        });

        // Delete/Backspace to remove selected node
        document.addEventListener('keydown', (e) => {
            if (!editMode) return;
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodeId) {
                e.preventDefault();
                const nodeToDelete = selectedNodeId;
                selectedNodeId = null;
                deleteNode(nodeToDelete);
            }
        });

        // ========================================================================
        // GRAPH EDITOR -- OPERATIONS
        // ========================================================================

        async function addNode(position) {
            const id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            const nodeData = {
                id: id,
                position: [
                    Math.round(position.x * 100) / 100,
                    Math.round(position.y * 100) / 100,
                    Math.round(position.z * 100) / 100
                ]
            };

            try {
                const response = await fetch('/api/graph/node', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nodeData)
                });

                if (response.ok) {
                    const result = await response.json();
                    // Use server-returned data if available, otherwise use local
                    const newNode = result.node || nodeData;
                    graphNodes.push(newNode);
                    renderGraph();
                } else {
                    console.error('Failed to add node:', await response.text());
                }
            } catch (e) {
                console.error('Failed to add node:', e);
                // Add locally anyway for responsiveness
                graphNodes.push(nodeData);
                renderGraph();
            }
        }

        async function createEdge(fromId, toId) {
            // Check if edge already exists
            const exists = graphEdges.some(
                e => (e.from === fromId && e.to === toId) ||
                     (e.from === toId && e.to === fromId)
            );
            if (exists) return;

            const edgeData = { from: fromId, to: toId };

            try {
                const response = await fetch('/api/graph/edge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(edgeData)
                });

                if (response.ok) {
                    graphEdges.push(edgeData);
                    renderGraph();
                } else {
                    console.error('Failed to create edge:', await response.text());
                }
            } catch (e) {
                console.error('Failed to create edge:', e);
                graphEdges.push(edgeData);
                renderGraph();
            }
        }

        async function deleteNode(nodeId) {
            try {
                const response = await fetch('/api/graph/node/' + encodeURIComponent(nodeId), {
                    method: 'DELETE'
                });

                if (response.ok) {
                    graphNodes = graphNodes.filter(n => n.id !== nodeId);
                    graphEdges = graphEdges.filter(e => e.from !== nodeId && e.to !== nodeId);

                    if (selectedNodeId === nodeId) selectedNodeId = null;
                    if (hoveredNodeId === nodeId) hoveredNodeId = null;

                    renderGraph();
                } else {
                    console.error('Failed to delete node:', await response.text());
                }
            } catch (e) {
                console.error('Failed to delete node:', e);
                graphNodes = graphNodes.filter(n => n.id !== nodeId);
                graphEdges = graphEdges.filter(e => e.from !== nodeId && e.to !== nodeId);
                if (selectedNodeId === nodeId) selectedNodeId = null;
                if (hoveredNodeId === nodeId) hoveredNodeId = null;
                renderGraph();
            }
        }

        async function clearGraph() {
            try {
                const response = await fetch('/api/graph', { method: 'DELETE' });
                if (response.ok) {
                    graphNodes = [];
                    graphEdges = [];
                    selectedNodeId = null;
                    hoveredNodeId = null;
                    startNodeId = null;
                    renderGraph();
                }
            } catch (e) {
                console.error('Failed to clear graph:', e);
            }
        }

        async function moveNode(nodeId, newPosition) {
            const pos = [
                Math.round(newPosition.x * 100) / 100,
                Math.round(newPosition.y * 100) / 100,
                Math.round(newPosition.z * 100) / 100
            ];
            try {
                const response = await fetch('/api/graph/node/' + encodeURIComponent(nodeId), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ position: pos })
                });
                if (response.ok) {
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) node.position = pos;
                    renderGraph();
                }
            } catch (e) {
                console.error('Failed to move node:', e);
            }
        }

        async function setStartNode(nodeId) {
            try {
                const response = await fetch('/api/graph/start_node', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ node_id: nodeId })
                });
                if (response.ok) {
                    startNodeId = nodeId;
                    // Snap robot to start node
                    const node = graphNodes.find(n => n.id === nodeId);
                    if (node) {
                        robotPosition.set(node.position[0], node.position[1], node.position[2]);
                        robotMoving = false;
                        clearPathHighlight();
                        currentTargetNodeId = null;
                        document.getElementById('target-name').textContent = 'None';
                        updateRobotMarker();
                        updateRobotCamera();
                    }
                    updateNodeVisuals();
                }
            } catch (e) {
                console.error('Failed to set start node:', e);
            }
        }

        // Queued target: requested while robot is mid-segment
        let pendingTarget = null;

        function setRobotTarget(nodeId) {
            if (!liveMode) return;

            if (robotMoving && robotPath.length > 0 && robotPathTargetIdx < robotPath.length) {
                // Robot is mid-segment — queue the target and let it finish
                // the current edge first
                pendingTarget = nodeId;
                currentTargetNodeId = nodeId;
                document.getElementById('target-name').textContent = nodeId;
                updateNodeVisuals();
                return;
            }

            // Robot is idle at a node — request path immediately
            pendingTarget = null;
            currentTargetNodeId = nodeId;
            document.getElementById('target-name').textContent = nodeId;
            updateNodeVisuals();

            socket.emit('robot_command', {
                target: nodeId,
                from_node: robotCurrentNode
            });
        }

        // ========================================================================
        // GRAPH API
        // ========================================================================

        async function fetchGraph() {
            try {
                const response = await fetch('/api/graph');
                if (response.ok) {
                    const data = await response.json();
                    graphNodes = data.nodes || [];
                    graphEdges = data.edges || [];
                    startNodeId = data.start_node || null;
                    renderGraph();

                    // Snap robot to start node (or first node)
                    const spawnNode = startNodeId
                        ? graphNodes.find(n => n.id === startNodeId)
                        : graphNodes[0];
                    if (spawnNode) {
                        robotPosition.set(
                            spawnNode.position[0],
                            spawnNode.position[1],
                            spawnNode.position[2]
                        );
                        robotCurrentNode = spawnNode.id;
                        updateRobotMarker();
                        updateRobotCamera();
                    }
                }
            } catch (e) {
                console.error('Failed to fetch graph:', e);
            }
        }

        async function fetchGraphList() {
            try {
                const response = await fetch('/api/graphs');
                if (response.ok) {
                    const data = await response.json();
                    const select = document.getElementById('graph-select');
                    // Clear existing options except first
                    while (select.options.length > 1) {
                        select.remove(1);
                    }
                    const names = data.graphs || data || [];
                    for (const name of names) {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        select.appendChild(opt);
                    }
                }
            } catch (e) {
                console.error('Failed to fetch graph list:', e);
            }
        }

        async function saveGraph() {
            const name = prompt('Graph name:', 'default');
            if (!name) return;

            try {
                const response = await fetch('/api/graph/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });

                if (response.ok) {
                    fetchGraphList();
                } else {
                    console.error('Failed to save graph:', await response.text());
                }
            } catch (e) {
                console.error('Failed to save graph:', e);
            }
        }

        async function loadGraph(name) {
            if (!name) return;

            try {
                const response = await fetch('/api/graph/load/' + encodeURIComponent(name), {
                    method: 'POST'
                });

                if (response.ok) {
                    // Server loaded the graph, now fetch the updated data
                    await fetchGraph();
                } else {
                    console.error('Failed to load graph:', await response.text());
                }
            } catch (e) {
                console.error('Failed to load graph:', e);
            }
        }

        // ========================================================================
        // UI EVENT HANDLERS
        // ========================================================================

        // Edit mode toggle
        const btnEditMode = document.getElementById('btn-edit-mode');
        btnEditMode.addEventListener('click', () => {
            if (liveMode) return;  // can't edit while live
            editMode = !editMode;
            btnEditMode.classList.toggle('active', editMode);

            // Hide robot during editing, show when navigating
            robotGroup.visible = !editMode;

            if (!editMode) {
                connectMode = false;
                firstSelectedNode = null;
                selectedNodeId = null;
                document.getElementById('btn-add-edge').classList.remove('active');
                updateNodeVisuals();
            }

            updateModeIndicator(editMode
                ? 'Edit: dbl-click add, drag move, Del remove, right-click set start'
                : 'Navigate: orbit view'
            );
        });

        // Connect mode
        const btnAddEdge = document.getElementById('btn-add-edge');
        btnAddEdge.addEventListener('click', () => {
            if (!editMode) {
                editMode = true;
                btnEditMode.classList.add('active');
            }

            connectMode = !connectMode;
            btnAddEdge.classList.toggle('active', connectMode);
            firstSelectedNode = null;
            selectedNodeId = null;
            updateNodeVisuals();

            updateModeIndicator(connectMode
                ? 'Connect mode: click first node, then second node'
                : 'Edit: dbl-click add, drag move, Del remove, right-click set start'
            );
        });

        // Set start node button
        document.getElementById('btn-set-start').addEventListener('click', () => {
            if (selectedNodeId) {
                setStartNode(selectedNodeId);
            } else {
                updateModeIndicator('Select a node first, then click Set Start');
            }
        });

        // Save graph
        document.getElementById('btn-save-graph').addEventListener('click', saveGraph);

        // New graph
        document.getElementById('btn-new-graph').addEventListener('click', () => {
            if (graphNodes.length > 0 && !confirm('Clear current graph?')) return;
            clearGraph();
        });

        // Delete graph
        document.getElementById('btn-delete-graph').addEventListener('click', async () => {
            const names = await fetch('/api/graphs').then(r => r.json());
            if (names.length === 0) {
                alert('No saved graphs to delete.');
                return;
            }
            const name = prompt('Delete which graph?\n\nSaved: ' + names.join(', '));
            if (!name) return;
            if (!confirm('Permanently delete graph "' + name + '"?')) return;
            try {
                const resp = await fetch('/api/graph/delete/' + encodeURIComponent(name), { method: 'DELETE' });
                if (resp.ok) {
                    fetchGraphList();
                    // Also clear the active graph
                    await clearGraph();
                } else {
                    const err = await resp.json();
                    alert(err.error || 'Failed to delete graph');
                }
            } catch (e) {
                console.error('Failed to delete graph:', e);
            }
        });

        // Cycle scene orientation; persist per-scene.
        document.getElementById('btn-orient').addEventListener('click', () => {
            orientationIndex = (orientationIndex + 1) % ORIENTATION_PRESETS.length;
            applyOrientation(orientationIndex);
            persistOrientation(orientationIndex);
        });

        // Toggle walls: only affects structural mesh in orbit view; equipment always visible
        document.getElementById('btn-hide-walls').addEventListener('click', () => {
            wallsHidden = !wallsHidden;
            document.getElementById('btn-hide-walls').classList.toggle('active', wallsHidden);
            if (!fullMesh) return;
            fullMesh.visible = !wallsHidden;
        });

        // Load graph dropdown
        document.getElementById('graph-select').addEventListener('change', (e) => {
            if (e.target.value) {
                loadGraph(e.target.value);
                e.target.value = ''; // Reset dropdown
            }
        });

        // Camera view toggle
        const btnView3D = document.getElementById('btn-view-3d');
        const btnViewYolo = document.getElementById('btn-view-yolo');
        const annotatedImage = document.getElementById('annotated-image');
        const robotCanvas = robotRenderer.domElement;

        btnView3D.addEventListener('click', () => {
            showYoloView = false;
            btnView3D.classList.add('active');
            btnViewYolo.classList.remove('active');
            robotCanvas.style.display = 'block';
            annotatedImage.style.display = 'none';
        });

        btnViewYolo.addEventListener('click', () => {
            showYoloView = true;
            btnViewYolo.classList.add('active');
            btnView3D.classList.remove('active');
            robotCanvas.style.display = 'none';
            annotatedImage.style.display = 'block';
        });

        // Start/Stop button — toggles live mode
        const btnStartStop = document.getElementById('btn-start-stop');
        btnStartStop.addEventListener('click', () => {
            liveMode = !liveMode;
            isStreaming = liveMode;

            if (liveMode) {
                // Enter live mode: spawn robot at start node
                btnStartStop.textContent = 'Stop';
                btnStartStop.classList.add('stop');

                // Exit edit mode if active
                if (editMode) {
                    editMode = false;
                    btnEditMode.classList.remove('active');
                    connectMode = false;
                    document.getElementById('btn-add-edge').classList.remove('active');
                }

                // Snap robot to start node
                const spawnNode = startNodeId
                    ? graphNodes.find(n => n.id === startNodeId)
                    : graphNodes[0];
                if (spawnNode) {
                    robotPosition.set(spawnNode.position[0], spawnNode.position[1], spawnNode.position[2]);
                    robotCurrentNode = spawnNode.id;
                    robotYaw = 0;
                    robotMoving = false;
                    clearPathHighlight();
                    currentTargetNodeId = null;
                    document.getElementById('target-name').textContent = 'None';
                    updateRobotMarker();
                    updateRobotCamera();
                }

                robotGroup.visible = true;
                fpsResultCount = 0;
                fpsLastReset = performance.now();
                updateModeIndicator('Live: click a waypoint to navigate');
            } else {
                // Exit live mode
                btnStartStop.textContent = 'Start';
                btnStartStop.classList.remove('stop');
                robotMoving = false;
                clearPathHighlight();
                currentTargetNodeId = null;
                document.getElementById('target-name').textContent = 'None';
                updateNodeVisuals();
                updateModeIndicator('Navigate: orbit view');
            }
        });

        // Speed slider
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        speedSlider.addEventListener('input', () => {
            robotSpeed = parseFloat(speedSlider.value);
            speedValue.textContent = robotSpeed.toFixed(1);
        });

        // ========================================================================
        // DETECTION LIST (safe DOM construction)
        // ========================================================================

        function updateDetectionList(detections) {
            const listEl = document.getElementById('detection-list');
            const countEl = document.getElementById('det-count');

            countEl.textContent = String(detections.length);

            // Clear existing children
            while (listEl.firstChild) {
                listEl.removeChild(listEl.firstChild);
            }

            if (detections.length === 0) {
                const noDetDiv = document.createElement('div');
                noDetDiv.className = 'no-detections';
                noDetDiv.textContent = 'No detections';
                listEl.appendChild(noDetDiv);
                return;
            }

            for (const det of detections) {
                const item = document.createElement('div');
                item.className = 'detection-item';

                const labelSpan = document.createElement('span');
                labelSpan.className = 'det-label';
                labelSpan.textContent = det.label;

                const confSpan = document.createElement('span');
                confSpan.className = 'det-confidence';
                confSpan.textContent = (det.confidence * 100).toFixed(1) + '%';

                item.appendChild(labelSpan);
                item.appendChild(confSpan);
                listEl.appendChild(item);
            }
        }

        // ========================================================================
        // MODE INDICATOR
        // ========================================================================

        function updateModeIndicator(text) {
            const indicator = document.getElementById('mode-indicator');
            indicator.textContent = text;
            indicator.classList.toggle('editing', editMode || connectMode);
        }

        // ========================================================================
        // RESIZE HANDLER
        // ========================================================================

        function handleResize() {
            // Orbit view
            const orbitW = orbitContainer.clientWidth;
            const orbitH = orbitContainer.clientHeight;
            if (orbitW > 0 && orbitH > 0) {
                orbitCamera.aspect = orbitW / orbitH;
                orbitCamera.updateProjectionMatrix();
                orbitRenderer.setSize(orbitW, orbitH);
            }

            // Robot camera stays fixed at 640x480
        }

        window.addEventListener('resize', handleResize);

        // ========================================================================
        // FPS COUNTER
        // ========================================================================

        function updateFPSCounter() {
            const now = performance.now();
            const elapsed = (now - fpsLastReset) / 1000;
            if (elapsed >= 1.0) {
                const fps = Math.round(fpsResultCount / elapsed);
                document.getElementById('fps-value').textContent = String(fps);
                fpsResultCount = 0;
                fpsLastReset = now;
            }
        }

        // ========================================================================
        // ANIMATION LOOP
        // ========================================================================

        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;
            robotDelta = Math.min(delta, 0.1);  // clamp to avoid big jumps

            // Update orbit controls
            orbitControls.update();

            // Update robot movement
            updateRobotMovement();

            // Update robot marker in orbit view
            updateRobotMarker();

            // Update robot camera
            updateRobotCamera();

            // Capture and send frames if streaming
            if (isStreaming) {
                captureAndSendFrame();
            }

            // Render orbit view (shows no-walls mesh if toggled)
            orbitRenderer.render(orbitScene, orbitCamera);

            // Render robot camera view — always show full scene, hide robot and graph
            if (!showYoloView || isStreaming) {
                robotGroup.visible = false;
                graphGroup.visible = false;
                const savedWallsVisible = fullMesh ? fullMesh.visible : true;
                if (fullMesh) fullMesh.visible = true;
                robotRenderer.render(robotScene, robotCamera);
                if (fullMesh) fullMesh.visible = savedWallsVisible;
                graphGroup.visible = true;
                robotGroup.visible = liveMode && !editMode;
            }

            // Update FPS counter
            updateFPSCounter();
        }

        animate();

        // ========================================================================
        // INITIAL SIZE FIX
        // ========================================================================

        // Wait for layout to settle before sizing
        requestAnimationFrame(() => {
            handleResize();
        });

    </script>
</body>
</html>
